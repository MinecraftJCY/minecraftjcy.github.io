<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星际大战</title>
    <style>
      :root {
        --bg: #020010;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        overflow: hidden;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        height: 100vh;
        width: 100vw;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        cursor: default;
      }
      canvas.playing {
        cursor: none;
      }
      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #mobile-hint {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(180, 200, 255, 0.7);
        font-size: 14px;
        letter-spacing: 2px;
        pointer-events: none;
        z-index: 11;
        transition: opacity 0.8s;
        text-align: center;
      }
      @media (min-width: 768px) {
        #mobile-hint {
          bottom: 40px;
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="mobile-hint">🖱 鼠标移动 / 键盘方向键 · 自动射击</div>
    <script>
      (function () {
        "use strict";
        const FONT = '"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
        const PI2 = Math.PI * 2;
        const HALF_PI = Math.PI / 2;
        const CFG = Object.freeze({
          STAR_COUNT: 200,
          NEBULA_COUNT: 5,
          MAX_PARTICLES: 500,
          MAX_DPR: 2,
          PLAYER_Y_MIN_RATIO: 0.15,
          PLAYER_SMOOTH_FACTOR: 0.12,
          COMBO_DURATION: 1.5,
          COMBO_DISPLAY_THRESHOLD: 3,
          COMBO_MAX_BONUS: 10,
          COMBO_BONUS_MULTIPLIER: 5,
          SUPER_COMBO_THRESHOLD: 12,
          GLOW_COMBO_THRESHOLD: 5,
          LEVEL_UP_INTERVAL: 15,
          HINT_DURATION: 8,
          HINT_FADE_START: 5,
          HINT_FADE_DURATION: 3,
          MENU_PARTICLE_HINT_DURATION: 6,
          BOSS_BASE_SCORE: 600,
          BOSS_SCORE_INCREMENT: 500,
          BOSS_HP_INCREMENT: 8,
          WEAPON_FIRE_RATES: Object.freeze({ 1: 0.22, 2: 0.15, 3: 0.1, 4: 0.08 }),
          WEAPON_MAX_LEVEL: 4,
          WEAPON_DURATION: 20,
          WEAPON_DOWNGRADE_THRESHOLD: 15,
          SHIELD_DURATION: 18,
          SHIELD_BREAK_INVINCIBLE: 0.8,
          SHIELD_COLLISION_INVINCIBLE: 1.2,
          HIT_INVINCIBLE: 1.8,
          COLLISION_INVINCIBLE: 2.0,
          MAX_LIVES: 5,
          PLAYER_HIT_DAMAGE: 1,
          SHIELD_HIT_DAMAGE: 2,
          BULLET_TRAIL_MAX: 12,
          BULLET_TRAIL_LIFE: 0.15,
          MAX_DT: 0.2,
          SCREEN_SHAKE_DECAY: 8,
          SCREEN_SHAKE_INTENSITY: 18,
          PARTICLE_GRAVITY_BASE: 40,
          PARTICLE_GRAVITY_RAND: 60,
          PARTICLE_SHRINK_RATE: 0.8,
          FLOATING_TEXT_SPEED: 60,
          FLOATING_TEXT_LIFE: 1.2,
          FLOATING_TEXT_SCALE_RATE: 0.5,
        });
        const STATE = Object.freeze({ MENU: "menu", PLAYING: "playing", PAUSED: "paused", GAMEOVER: "gameover" });
        const PAUSE_BTN = Object.freeze({ width: 180, height: 44, resumeYRatio: 0.48, restartYRatio: 0.62 });
        const ENEMY_TYPES = Object.freeze({
          scout: Object.freeze({ width: 24, height: 20, hp: 1, speed: 180, speedRand: 140, score: 10, color1: "#e8453c", color2: "#ff6b55", canShoot: false, shootCooldown: 0, shootCooldownRand: 0, amplitude: 50, amplitudeRand: 40, frequency: 2.5, frequencyRand: 3, glowColor: "255,100,80" }),
          fighter: Object.freeze({ width: 30, height: 26, hp: 2, speed: 140, speedRand: 100, score: 25, color1: "#e87830", color2: "#ff9a55", canShoot: true, shootCooldown: 1.5, shootCooldownRand: 2, amplitude: 70, amplitudeRand: 50, frequency: 1.5, frequencyRand: 2, glowColor: "255,150,90" }),
          cruiser: Object.freeze({ width: 44, height: 34, hp: 4, speed: 90, speedRand: 60, score: 50, color1: "#c040a0", color2: "#e870c8", canShoot: true, shootCooldown: 1.0, shootCooldownRand: 1.5, amplitude: 40, amplitudeRand: 30, frequency: 0.8, frequencyRand: 1.2, glowColor: "220,100,180" }),
          boss: Object.freeze({ width: 70, height: 50, hp: 20, hpPerDefeat: 8, speed: 55, speedRand: 30, score: 250, scorePerDefeat: 100, color1: "#d83030", color2: "#ff5050", canShoot: true, shootCooldown: 0.5, shootCooldownRand: 0, amplitudeRatio: 0.35, frequency: 0.5, glowColor: "255,80,60" }),
        });
        const POWERUP_TYPES = Object.freeze({
          health: Object.freeze({ color: "#4eff7e", icon: "♥", r: 78, g: 255, b: 126 }),
          weapon: Object.freeze({ color: "#ffbe4e", icon: "⚡", r: 255, g: 190, b: 78 }),
          shield: Object.freeze({ color: "#4ec8ff", icon: "🛡", r: 78, g: 200, b: 255 }),
        });
        function rectsOverlap(a, b) {
          return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }
        function bulletRect(b) {
          return { x: b.x - b.radius, y: b.y - b.radius, w: b.radius * 2, h: b.radius * 2 };
        }
        function roundRect(ctx, x, y, w, h, r) {
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y, x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x, y + h, r);
          ctx.arcTo(x, y + h, x, y, r);
          ctx.arcTo(x, y, x + w, y, r);
          ctx.closePath();
        }
        function createGameStore() {
          const store = {
            state: STATE.MENU,
            score: 0,
            highScore: 0,
            lives: 3,
            level: 1,
            weaponLevel: 1,
            weaponTimer: 0,
            shieldActive: false,
            shieldTimer: 0,
            screenShake: 0,
            comboCount: 0,
            comboTimer: 0,
            maxCombo: 0,
            enemiesDestroyed: 0,
            bossActive: false,
            bossDefeatedCount: 0,
            enemySpawnTimer: 0,
            bossSpawnScore: CFG.BOSS_BASE_SCORE,
            gameTime: 0,
            loadHighScore() {
              try {
                const v = localStorage.getItem("starVoyage_highScore");
                if (v) this.highScore = parseInt(v) || 0;
              } catch (e) {}
            },
            saveHighScore() {
              if (this.score > this.highScore) {
                this.highScore = this.score;
                try {
                  localStorage.setItem("starVoyage_highScore", this.highScore);
                } catch (e) {}
              }
            },
            reset() {
              this.score = 0;
              this.lives = 3;
              this.level = 1;
              this.weaponLevel = 1;
              this.weaponTimer = 0;
              this.shieldActive = false;
              this.shieldTimer = 0;
              this.screenShake = 0;
              this.comboCount = 0;
              this.comboTimer = 0;
              this.maxCombo = 0;
              this.enemiesDestroyed = 0;
              this.bossActive = false;
              this.bossDefeatedCount = 0;
              this.enemySpawnTimer = 0;
              this.bossSpawnScore = CFG.BOSS_BASE_SCORE;
              this.gameTime = 0;
            },
            addScore(base) {
              const bonus = Math.min(this.comboCount - 1, CFG.COMBO_MAX_BONUS) * CFG.COMBO_BONUS_MULTIPLIER;
              const total = base + bonus;
              this.score += total;
              return total;
            },
            updateCombo() {
              this.comboCount++;
              this.comboTimer = CFG.COMBO_DURATION;
              if (this.comboCount > this.maxCombo) this.maxCombo = this.comboCount;
            },
            tickCombo(dt) {
              if (this.comboTimer > 0) {
                this.comboTimer -= dt;
                if (this.comboTimer <= 0) this.comboCount = 0;
              }
            },
            tickWeapon(dt) {
              if (this.weaponTimer > 0) {
                this.weaponTimer -= dt;
                if (this.weaponTimer <= 0 && this.weaponLevel > 1) {
                  this.weaponLevel = Math.max(1, this.weaponLevel - 1);
                  if (this.weaponLevel > 1) this.weaponTimer = CFG.WEAPON_DOWNGRADE_THRESHOLD;
                }
              }
            },
            tickShield(dt) {
              if (this.shieldTimer > 0) {
                this.shieldTimer -= dt;
                if (this.shieldTimer <= 0) this.shieldActive = false;
              }
            },
            tickScreenShake(dt) {
              if (this.screenShake > 0) this.screenShake *= Math.max(0, 1 - dt * CFG.SCREEN_SHAKE_DECAY);
            },
            checkLevelUp() {
              const nl = Math.floor(this.enemiesDestroyed / CFG.LEVEL_UP_INTERVAL) + 1;
              if (nl > this.level) {
                this.level = nl;
                return true;
              }
              return false;
            },
            getFireRate() {
              return CFG.WEAPON_FIRE_RATES[Math.min(this.weaponLevel, CFG.WEAPON_MAX_LEVEL)];
            },
          };
          return store;
        }
        function createPlayer(W, H) {
          return {
            x: W / 2,
            y: H * 0.78,
            width: 36,
            height: 44,
            speed: 420,
            targetX: W / 2,
            targetY: H * 0.78,
            smoothFactor: CFG.PLAYER_SMOOTH_FACTOR,
            invincible: 0,
            engineGlow: 0,
            _lastFire: 0,
          };
        }
        function createBullet(x, y, angle, speed) {
          return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, radius: 2.5, alive: true, trail: [] };
        }
        function createEnemyBullet(x, y, vx, vy) {
          return { x, y, vx, vy, radius: 4, alive: true };
        }
        function createStar(W, H, initial) {
          const size = Math.random() * 2.5 + 0.5;
          const r = Math.random();
          const hue = r < 0.15 ? 210 + Math.random() * 30 : r < 0.23 ? 30 + Math.random() * 20 : 220 + Math.random() * 40;
          return {
            x: Math.random() * W,
            y: initial ? Math.random() * H : -10,
            size,
            speed: size * 0.6 + 0.3,
            opacity: Math.random() * 0.6 + 0.3,
            twinkleSpeed: Math.random() * 0.02 + 0.005,
            twinkleOffset: Math.random() * PI2,
            hue,
          };
        }
        function createNebula(W, H, initial) {
          return {
            x: Math.random() * W,
            y: initial ? Math.random() * H : -200 - Math.random() * 400,
            radius: Math.random() * 180 + 80,
            speed: Math.random() * 0.3 + 0.1,
            hue: [240, 260, 280, 300, 320, 200, 180][Math.floor(Math.random() * 7)],
            alpha: Math.random() * 0.04 + 0.015,
          };
        }
        function createEnemy(type, W, H, bossDefeatedCount) {
          const tc = ENEMY_TYPES[type];
          const isBoss = type === "boss";
          const hp = isBoss ? tc.hp + bossDefeatedCount * tc.hpPerDefeat : tc.hp;
          const score = isBoss ? tc.score + bossDefeatedCount * tc.scorePerDefeat : tc.score;
          const amplitude = isBoss ? W * tc.amplitudeRatio : tc.amplitude + Math.random() * tc.amplitudeRand;
          return {
            type,
            alive: true,
            flashTimer: 0,
            shootTimer: 0,
            phase: Math.random() * PI2,
            startX: Math.random() * (W - 120) + 60,
            x: isBoss ? W / 2 : Math.random() * (W - 120) + 60,
            y: isBoss ? -60 : -40,
            entered: false,
            width: tc.width,
            height: tc.height,
            hp,
            maxHp: hp,
            speed: tc.speed + Math.random() * tc.speedRand,
            score,
            color1: tc.color1,
            color2: tc.color2,
            canShoot: tc.canShoot,
            shootCooldown: tc.shootCooldown + (tc.shootCooldownRand > 0 ? Math.random() * tc.shootCooldownRand : 0),
            amplitude,
            frequency: tc.frequency + (tc.frequencyRand > 0 ? Math.random() * tc.frequencyRand : 0),
            glowColor: tc.glowColor,
            _bossMoveTimer: 0,
          };
        }
        function createParticle(x, y, r, g, b, size, life, vx, vy) {
          return { x, y, r, g, b, size, life, maxLife: life, vx, vy, alive: true, gravity: CFG.PARTICLE_GRAVITY_BASE + Math.random() * CFG.PARTICLE_GRAVITY_RAND };
        }
        function createFloatingText(x, y, text, color, size) {
          return { x, y, text, color, size, life: CFG.FLOATING_TEXT_LIFE, maxLife: CFG.FLOATING_TEXT_LIFE, alive: true };
        }
        function createPowerUp(x, y, type) {
          const tc = POWERUP_TYPES[type];
          return { x, y, type, radius: 14, alive: true, vy: 100, bobOffset: Math.random() * PI2, color: tc.color, icon: tc.icon, r: tc.r, g: tc.g, b: tc.b };
        }
        function createEntityManager() {
          return {
            bullets: [],
            enemyBullets: [],
            enemies: [],
            particles: [],
            floatingTexts: [],
            powerUps: [],
            removeDead(arr) {
              let w = 0;
              for (let i = 0; i < arr.length; i++) {
                if (arr[i].alive) arr[w++] = arr[i];
              }
              arr.length = w;
            },
            clear() {
              this.bullets.length = 0;
              this.enemyBullets.length = 0;
              this.enemies.length = 0;
              this.particles.length = 0;
              this.floatingTexts.length = 0;
              this.powerUps.length = 0;
            },
            getBoss() {
              return this.enemies.find((e) => e.type === "boss" && e.alive);
            },
            hasBoss() {
              return this.enemies.some((e) => e.type === "boss" && e.alive);
            },
            capParticles(max) {
              if (this.particles.length > max) this.particles.splice(0, this.particles.length - max);
            },
          };
        }
        function createBackgroundManager() {
          const stars = [];
          const nebulae = [];
          return {
            stars,
            nebulae,
            init(W, H) {
              stars.length = 0;
              nebulae.length = 0;
              for (let i = 0; i < CFG.STAR_COUNT; i++) stars.push(createStar(W, H, true));
              for (let i = 0; i < CFG.NEBULA_COUNT; i++) nebulae.push(createNebula(W, H, true));
            },
            update(W, H, dt) {
              const dt60 = dt * 60;
              for (const s of stars) {
                s.y += s.speed * dt60;
                if (s.y > H + 10) {
                  s.y = -10;
                  s.x = Math.random() * W;
                }
              }
              for (const n of nebulae) {
                n.y += n.speed * dt60;
                if (n.y > H + n.radius * 2) {
                  n.y = -n.radius * 2;
                  n.x = Math.random() * W;
                }
              }
            },
          };
        }
        function createGameContext(canvas, ctx) {
          const W = { v: 0 };
          const H = { v: 0 };
          const dpr = { v: 1 };
          function resizeCanvas() {
            dpr.v = Math.min(window.devicePixelRatio || 1, CFG.MAX_DPR);
            W.v = window.innerWidth;
            H.v = window.innerHeight;
            canvas.width = W.v * dpr.v;
            canvas.height = H.v * dpr.v;
            canvas.style.width = W.v + "px";
            canvas.style.height = H.v + "px";
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr.v, dpr.v);
          }
          window.addEventListener("resize", resizeCanvas);
          window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 200));
          resizeCanvas();
          const store = createGameStore();
          store.loadHighScore();
          const player = createPlayer(W.v, H.v);
          const entities = createEntityManager();
          const bgMgr = createBackgroundManager();
          bgMgr.init(W.v, H.v);
          return {
            get W() {
              return W.v;
            },
            get H() {
              return H.v;
            },
            get dpr() {
              return dpr.v;
            },
            canvas,
            ctx,
            store,
            player,
            entities,
            bgMgr,
            resizeCanvas,
          };
        }
        function createInputManager(canvas, onMenuSelect) {
          const keys = {};
          let mouseX = 0,
            mouseY = 0,
            mouseActive = false;
          let touchActive = false,
            touchX = 0,
            touchY = 0;
          window.addEventListener("keydown", (e) => {
            keys[e.key] = true;
            if (e.key === " " || e.key === "ArrowUp" || e.key === "ArrowDown") e.preventDefault();
            if (e.key === "p" || e.key === "P" || e.key === "Escape") onMenuSelect("pause");
            if (onMenuSelect && onMenuSelect("start", e.key)) e.preventDefault();
          });
          window.addEventListener("keyup", (e) => {
            keys[e.key] = false;
          });
          canvas.addEventListener("mousemove", (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseActive = true;
          });
          canvas.addEventListener("mouseenter", () => {
            mouseActive = true;
          });
          canvas.addEventListener("mouseleave", () => {
            mouseActive = false;
          });
          canvas.addEventListener("click", (e) => {
            if (onMenuSelect) onMenuSelect("click", null, e.clientX, e.clientY);
          });
          canvas.addEventListener(
            "touchstart",
            (e) => {
              e.preventDefault();
              touchActive = true;
              touchX = e.touches[0].clientX;
              touchY = e.touches[0].clientY;
              if (onMenuSelect) onMenuSelect("touch");
            },
            { passive: false },
          );
          canvas.addEventListener(
            "touchmove",
            (e) => {
              e.preventDefault();
              touchX = e.touches[0].clientX;
              touchY = e.touches[0].clientY;
            },
            { passive: false },
          );
          canvas.addEventListener(
            "touchend",
            (e) => {
              e.preventDefault();
              touchActive = false;
            },
            { passive: false },
          );
          return {
            isKey(k) {
              return !!keys[k];
            },
            isMouseActive() {
              return mouseActive;
            },
            isTouchActive() {
              return touchActive;
            },
            getMousePos() {
              return { x: mouseX, y: mouseY };
            },
            getTouchPos() {
              return { x: touchX, y: touchY };
            },
            getMoveDelta() {
              let mx = 0,
                my = 0;
              if (keys["ArrowLeft"] || keys["a"] || keys["A"]) mx = -1;
              if (keys["ArrowRight"] || keys["d"] || keys["D"]) mx = 1;
              if (keys["ArrowUp"] || keys["w"] || keys["W"]) my = -1;
              if (keys["ArrowDown"] || keys["s"] || keys["S"]) my = 1;
              return { x: mx, y: my };
            },
          };
        }
        function createCollisionSystem(store, entities, player, spawnEffects) {
          function hitEnemy(e, dmg) {
            e.hp -= dmg;
            e.flashTimer = 0.1;
            if (e.hp <= 0) {
              e.alive = false;
              return true;
            }
            return false;
          }
          function applyPowerUp(pu) {
            if (pu.type === "health") {
              store.lives = Math.min(CFG.MAX_LIVES, store.lives + 1);
              entities.floatingTexts.push(createFloatingText(pu.x, pu.y, "+1 ❤️", "#4eff7e", 16));
            } else if (pu.type === "weapon") {
              store.weaponLevel = Math.min(CFG.WEAPON_MAX_LEVEL, store.weaponLevel + 1);
              store.weaponTimer = CFG.WEAPON_DURATION;
              entities.floatingTexts.push(createFloatingText(pu.x, pu.y, "武器升级! Lv" + store.weaponLevel, "#ffbe4e", 15));
            } else if (pu.type === "shield") {
              store.shieldActive = true;
              store.shieldTimer = CFG.SHIELD_DURATION;
              entities.floatingTexts.push(createFloatingText(pu.x, pu.y, "护盾激活!", "#4ec8ff", 15));
            }
          }
          function playerBounds(p) {
            return { x: p.x - p.width * 0.38, y: p.y - p.height * 0.45, w: p.width * 0.76, h: p.height * 0.8 };
          }
          function enemyBounds(e) {
            return { x: e.x - e.width * 0.55, y: e.y - e.height * 0.45, w: e.width * 1.1, h: e.height * 0.85 };
          }
          function powerUpBounds(pu) {
            return { x: pu.x - pu.radius, y: pu.y + Math.sin(pu.bobOffset) * 5 - pu.radius, w: pu.radius * 2, h: pu.radius * 2 };
          }
          return {
            checkBulletEnemy() {
              const bullets = entities.bullets;
              const enemies = entities.enemies;
              for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                if (!b.alive) continue;
                const br = bulletRect(b);
                for (let j = 0; j < enemies.length; j++) {
                  const e = enemies[j];
                  if (!e.alive) continue;
                  if (rectsOverlap(br, enemyBounds(e))) {
                    b.alive = false;
                    const killed = hitEnemy(e, 1);
                    spawnEffects.spark(b.x, b.y, e.x, e.y, 5);
                    if (killed) spawnEffects.enemyDeath(e);
                    break;
                  }
                }
              }
            },
            checkEnemyBulletPlayer() {
              if (player.invincible > 0) return;
              const pBounds = playerBounds(player);
              for (let i = entities.enemyBullets.length - 1; i >= 0; i--) {
                const b = entities.enemyBullets[i];
                if (!b.alive) continue;
                if (rectsOverlap(bulletRect(b), pBounds)) {
                  b.alive = false;
                  if (store.shieldActive) {
                    store.shieldActive = false;
                    store.shieldTimer = 0;
                    spawnEffects.explosion(player.x, player.y, 20, [120, 220, 255], [200, 240, 255], [1, 5]);
                    entities.floatingTexts.push(createFloatingText(player.x, player.y - 20, "护盾破碎!", "#4ec8ff", 14));
                    player.invincible = CFG.SHIELD_BREAK_INVINCIBLE;
                  } else {
                    spawnEffects.playerHit();
                  }
                }
              }
            },
            checkEnemyPlayer() {
              if (player.invincible > 0) return;
              const pBounds = playerBounds(player);
              for (const e of entities.enemies) {
                if (!e.alive) continue;
                if (rectsOverlap(pBounds, enemyBounds(e))) {
                  if (store.shieldActive) {
                    store.shieldActive = false;
                    store.shieldTimer = 0;
                    hitEnemy(e, CFG.SHIELD_HIT_DAMAGE);
                    spawnEffects.explosion(player.x, player.y, 25, [120, 220, 255], [200, 240, 255], [1, 5]);

            p.y += p.vy * dt;
            p.vy += p.gravity * dt;
            p.size = Math.max(0.2, p.size * (1 - dt * CFG.PARTICLE_SHRINK_RATE));
          }
          g.entities.removeDead(g.entities.particles);
          for (const ft of g.entities.floatingTexts) {
            ft.life -= dt;
            if (ft.life <= 0) {
              ft.alive = false;
              continue;
            }
            ft.y -= CFG.FLOATING_TEXT_SPEED * dt;
          }
          g.entities.removeDead(g.entities.floatingTexts);
        }
        let lastTime = performance.now();
        function gameLoop(timestamp) {
          const dt = Math.min(CFG.MAX_DT, (timestamp - lastTime) / 1000);
          lastTime = timestamp;
          update(dt);
          renderer.drawGameScene(g.W, g.H, g.bgMgr);
          renderer.updateMobileHint();
          requestAnimationFrame(gameLoop);
        }
        changeState(STATE.MENU);
        g.store.gameTime = 0;
        lastTime = performance.now();
        mobileHint.style.opacity = "0.7";
        mobileHint.textContent = "点击屏幕开始 · 鼠标移动飞船 · 自动射击";
        requestAnimationFrame(gameLoop);
      })();
    </script>
  </body>
</html>
