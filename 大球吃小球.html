<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大球吃小球</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e1a;
      }
      canvas {
        display: block;
        cursor: none;
      }
      #ui-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      #score-panel {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 10px 32px;
        display: flex;
        gap: 36px;
        align-items: center;
      }
      #score-panel .item {
        text-align: center;
      }
      #score-panel .label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      #score-panel .value {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        margin-top: 2px;
      }
      #start-screen,
      #end-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(10, 14, 26, 0.85);
        backdrop-filter: blur(8px);
        pointer-events: auto;
        transition: opacity 0.5s;
      }
      #end-screen {
        display: none;
      }
      .title {
        font-size: 56px;
        font-weight: 800;
        color: #fff;
        text-shadow:
          0 0 40px rgba(99, 179, 255, 0.4),
          0 0 80px rgba(99, 179, 255, 0.2);
        margin-bottom: 12px;
      }
      .subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 48px;
        letter-spacing: 1px;
      }
      .btn {
        pointer-events: auto;
        cursor: pointer;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        padding: 14px 48px;
        border-radius: 50px;
        letter-spacing: 1px;
        box-shadow: 0 4px 24px rgba(99, 102, 241, 0.4);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 32px rgba(99, 102, 241, 0.6);
      }
      .end-score {
        font-size: 72px;
        font-weight: 800;
        color: #fff;
        margin: 12px 0;
      }
      .end-label {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .end-best {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.4);
        margin: 8px 0 36px;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui-overlay">
      <div id="score-panel">
        <div class="item">
          <div class="label">分数</div>
          <div class="value" id="score-val">0</div>
        </div>
        <div class="item">
          <div class="label">大小</div>
          <div class="value" id="size-val">20</div>
        </div>
      </div>
      <div id="start-screen">
        <div class="title">大球吃小球</div>
        <div class="subtitle">用鼠标控制你的球，吃掉比你小的球，躲避比你大的球</div>
        <button class="btn" id="start-btn">开始游戏</button>
      </div>
      <div id="end-screen">
        <div class="end-label">游戏结束</div>
        <div class="end-score" id="final-score">0</div>
        <div class="end-label">最终得分</div>
        <div class="end-best" id="best-score">最高纪录：0</div>
        <button class="btn" id="restart-btn">再来一局</button>
      </div>
    </div>
    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      let W, H;
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);
      let gameState = "menu";
      let score = 0;
      let bestScore = parseInt(localStorage.getItem("bigball_best") || "0");
      let player, balls, particles, ripples;
      let mouseX, mouseY;
      let spawnTimer = 0;
      let difficultyTimer = 0;
      let spawnRate = 0.8;
      const BALL_COLORS = [
        ["#f472b6", "#ec4899"],
        ["#fb923c", "#f97316"],
        ["#facc15", "#eab308"],
        ["#4ade80", "#22c55e"],
        ["#38bdf8", "#0ea5e9"],
        ["#818cf8", "#6366f1"],
        ["#c084fc", "#a855f7"],
        ["#f87171", "#ef4444"],
        ["#2dd4bf", "#14b8a6"],
        ["#a78bfa", "#8b5cf6"],
      ];
      const PLAYER_COLORS = ["#60a5fa", "#3b82f6"];
      function rand(a, b) {
        return Math.random() * (b - a) + a;
      }
      function dist(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
      }
      function createPlayer() {
        return { x: W / 2, y: H / 2, r: 22, targetR: 22, vx: 0, vy: 0, trail: [] };
      }
      function spawnBall() {
        const r = rand(8, 60);
        const side = Math.floor(rand(0, 4));
        let x, y, vx, vy;
        const speed = rand(60, 180);
        const margin = 80;
        if (side === 0) {
          x = -margin;
          y = rand(0, H);
        } else if (side === 1) {
          x = W + margin;
          y = rand(0, H);
        } else if (side === 2) {
          x = rand(0, W);
          y = -margin;
        } else {
          x = rand(0, W);
          y = H + margin;
        }
        const targetX = side === 0 ? rand(W * 0.3, W + margin) : side === 1 ? rand(-margin, W * 0.7) : rand(0, W);
        const targetY = side === 2 ? rand(H * 0.3, H + margin) : side === 3 ? rand(-margin, H * 0.7) : rand(0, H);
        const angle = Math.atan2(targetY - y, targetX - x) + rand(-0.3, 0.3);
        vx = Math.cos(angle) * speed;
        vy = Math.sin(angle) * speed;
        const c = BALL_COLORS[Math.floor(rand(0, BALL_COLORS.length))];
        balls.push({ x, y, r, vx, vy, color: c, alive: true, opacity: 1, pulse: rand(0, Math.PI * 2) });
      }
      function emitParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(80, 260);
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            r: rand(2, 5),
            life: 1,
            decay: rand(1.5, 3),
            color,
          });
        }
      }
      function emitRipple(x, y, color) {
        ripples.push({ x, y, r: 5, maxR: 80, life: 1, color });
      }
      function initGame() {
        player = createPlayer();
        balls = [];
        particles = [];
        ripples = [];
        score = 0;
        spawnTimer = 0;
        difficultyTimer = 0;
        spawnRate = 0.6;
        mouseX = W / 2;
        mouseY = H / 2;
        for (let i = 0; i < 15; i++) {
          spawnBall();
          const b = balls[balls.length - 1];
          b.x = rand(0, W);
          b.y = rand(0, H);
        }
      }
      let lastTime = 0;
      function update(dt) {
        if (gameState !== "playing") return;
        difficultyTimer += dt;
        if (difficultyTimer > 5) {
          difficultyTimer = 0;
          spawnRate = Math.max(0.15, spawnRate - 0.03);
        }
        spawnTimer += dt;
        if (spawnTimer >= spawnRate) {
          spawnTimer = 0;
          spawnBall();
        }
        const dx = mouseX - player.x;
        const dy = mouseY - player.y;
        const d = Math.hypot(dx, dy);
        const speed = Math.min(d * 8, 600);
        if (d > 1) {
          player.vx += ((dx / d) * speed - player.vx) * Math.min(dt * 6, 1);
          player.vy += ((dy / d) * speed - player.vy) * Math.min(dt * 6, 1);
        }
        player.x += player.vx * dt;
        player.y += player.vy * dt;
        player.r += (player.targetR - player.r) * Math.min(dt * 5, 1);
        player.trail.push({ x: player.x, y: player.y, r: player.r, life: 1 });
        if (player.trail.length > 20) player.trail.shift();
        player.trail.forEach((t) => (t.life -= dt * 3));
        player.trail = player.trail.filter((t) => t.life > 0);
        for (let b of balls) {
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          b.pulse += dt * 2;
          const margin = 150;
          if (b.x < -margin || b.x > W + margin || b.y < -margin || b.y > H + margin) {
            b.alive = false;
          }
          if (b.alive) {
            const dd = dist(player.x, player.y, b.x, b.y);
            if (dd < player.r + b.r) {
              if (player.r > b.r * 1.1) {
                const area = Math.PI * b.r * b.r;
                player.targetR = Math.sqrt((Math.PI * player.targetR * player.targetR + area * 0.8) / Math.PI);
                score += Math.round(b.r * 2);
                b.alive = false;
                emitParticles(b.x, b.y, b.color[0], Math.round(b.r * 0.6));
                emitRipple(b.x, b.y, b.color[0]);
              } else if (b.r > player.r * 1.1) {
                gameOver();
                return;
              }
            }
          }
        }
        balls = balls.filter((b) => b.alive);
        for (let p of particles) {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= Math.pow(0.05, dt);
          p.vy *= Math.pow(0.05, dt);
          p.life -= p.decay * dt;
          p.r *= Math.pow(0.3, dt);
        }
        particles = particles.filter((p) => p.life > 0);
        for (let r of ripples) {
          r.r += (r.maxR - r.r) * Math.min(dt * 4, 1);
          r.life -= dt * 2.5;
        }
        ripples = ripples.filter((r) => r.life > 0);
        document.getElementById("score-val").textContent = score;
        document.getElementById("size-val").textContent = Math.round(player.r);
      }
      function drawBackground() {
        const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
        grad.addColorStop(0, "#111827");
        grad.addColorStop(1, "#0a0e1a");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = "rgba(255,255,255,0.03)";
        ctx.lineWidth = 1;
        const gridSize = 60;
        for (let x = gridSize; x < W; x += gridSize) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
          ctx.stroke();
        }
        for (let y = gridSize; y < H; y += gridSize) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }
        const time = performance.now() * 0.001;
        ctx.fillStyle = "rgba(255,255,255,0.04)";
        for (let i = 0; i < 30; i++) {
          const bx = (Math.sin(i * 3.7 + time * 0.1) * 0.5 + 0.5) * W;
          const by = (Math.cos(i * 2.3 + time * 0.15) * 0.5 + 0.5) * H;
          ctx.beginPath();
          ctx.arc(bx, by, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      function drawBall(x, y, r, color, pulse, glowIntensity) {
        const pr = r + Math.sin(pulse || 0) * r * 0.03;
        const glow = ctx.createRadialGradient(x, y, pr * 0.5, x, y, pr * 2.2);
        glow.addColorStop(0, color[0] + "30");
        glow.addColorStop(1, color[0] + "00");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(x, y, pr * 2.2, 0, Math.PI * 2);
        ctx.fill();
        const grad = ctx.createRadialGradient(x - pr * 0.3, y - pr * 0.3, pr * 0.1, x, y, pr);
        grad.addColorStop(0, lighten(color[0], 40));
        grad.addColorStop(0.5, color[0]);
        grad.addColorStop(1, color[1]);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, pr, 0, Math.PI * 2);
        ctx.fill();
        const hlGrad = ctx.createRadialGradient(x - pr * 0.35, y - pr * 0.35, 0, x - pr * 0.2, y - pr * 0.2, pr * 0.6);
        hlGrad.addColorStop(0, "rgba(255,255,255,0.5)");
        hlGrad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = hlGrad;
        ctx.beginPath();
        ctx.arc(x, y, pr, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(x, y, pr - 0.75, 0, Math.PI * 2);
        ctx.stroke();
      }
      function drawPlayer() {
        if (!player) return;
        for (let t of player.trail) {
          ctx.fillStyle = `rgba(96,165,250,${t.life * 0.1})`;
          ctx.beginPath();
          ctx.arc(t.x, t.y, t.r * t.life * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }
        drawBall(player.x, player.y, player.r, PLAYER_COLORS, performance.now() * 0.003, 1);
        ctx.strokeStyle = "rgba(96,165,250,0.2)";
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r + 6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      function drawBalls() {
        for (let b of balls) {
          const dd = dist(player.x, player.y, b.x, b.y);
          if (dd < 300 && gameState === "playing") {
            const canEat = player.r > b.r * 1.1;
            const danger = b.r > player.r * 1.1;
            if (canEat) {
              ctx.strokeStyle = "rgba(74,222,128,0.25)";
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(b.x, b.y, b.r + 4, 0, Math.PI * 2);
              ctx.stroke();
            } else if (danger) {
              ctx.strokeStyle = "rgba(248,113,113,0.3)";
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(b.x, b.y, b.r + 4, 0, Math.PI * 2);
              ctx.stroke();
            }
          }
          drawBall(b.x, b.y, b.r, b.color, b.pulse, 0.5);
        }
      }
      function drawParticles() {
        for (let p of particles) {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(p.r, 0.5), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      function drawRipples() {
        for (let r of ripples) {
          ctx.globalAlpha = r.life * 0.4;
          ctx.strokeStyle = r.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
      function drawCursor() {
        if (gameState !== "playing") return;
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 1.5;
        const s = 8;
        ctx.beginPath();
        ctx.moveTo(mouseX - s, mouseY);
        ctx.lineTo(mouseX + s, mouseY);
        ctx.moveTo(mouseX, mouseY - s);
        ctx.lineTo(mouseX, mouseY + s);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 4, 0, Math.PI * 2);
        ctx.stroke();
      }
      function draw() {
        drawBackground();
        if (gameState === "playing" || gameState === "dead") {
          drawRipples();
          drawBalls();
          drawParticles();
          drawPlayer();
          drawCursor();
        }
      }
      function lighten(hex, amt) {
        let r = parseInt(hex.slice(1, 3), 16),
          g = parseInt(hex.slice(3, 5), 16),
          b = parseInt(hex.slice(5, 7), 16);
        r = Math.min(255, r + amt);
        g = Math.min(255, g + amt);
        b = Math.min(255, b + amt);
        return `rgb(${r},${g},${b})`;
      }
      function gameOver() {
        gameState = "dead";
        emitParticles(player.x, player.y, "#60a5fa", 40);
        emitRipple(player.x, player.y, "#60a5fa");
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem("bigball_best", bestScore);
        }
        setTimeout(() => {
          document.getElementById("final-score").textContent = score;
          document.getElementById("best-score").textContent = "最高纪录：" + bestScore;
          document.getElementById("end-screen").style.display = "flex";
        }, 600);
      }
      function loop(time) {
        const dt = Math.min((time - lastTime) / 1000, 0.05);
        lastTime = time;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }
      canvas.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });
      document.getElementById("start-btn").addEventListener("click", () => {
        document.getElementById("start-screen").style.display = "none";
        initGame();
        gameState = "playing";
      });
      document.getElementById("restart-btn").addEventListener("click", () => {
        document.getElementById("end-screen").style.display = "none";
        initGame();
        gameState = "playing";
      });
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
