<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大球吃小球</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e1a;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas {
        display: block;
        cursor: none;
        touch-action: none;
      }
      #ui-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      #score-panel {
        position: absolute;
        top: max(24px, env(safe-area-inset-top, 0px) + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 10px 32px;
        display: flex;
        gap: 36px;
        align-items: center;
      }
      #score-panel .item {
        text-align: center;
      }
      #score-panel .label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      #score-panel .value {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        margin-top: 2px;
        transition: transform 0.15s;
      }
      #score-panel .value.pop {
        transform: scale(1.25);
      }
      #start-screen,
      #end-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(10, 14, 26, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        pointer-events: auto;
        transition: opacity 0.5s;
        padding: 20px;
      }
      #end-screen {
        display: none;
      }
      .title {
        font-size: 56px;
        font-weight: 800;
        color: #fff;
        text-shadow:
          0 0 40px rgba(99, 179, 255, 0.4),
          0 0 80px rgba(99, 179, 255, 0.2);
        margin-bottom: 12px;
        text-align: center;
      }
      .subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 48px;
        letter-spacing: 1px;
        text-align: center;
        line-height: 1.5;
        max-width: 360px;
      }
      .btn {
        pointer-events: auto;
        cursor: pointer;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        padding: 14px 48px;
        border-radius: 50px;
        letter-spacing: 1px;
        box-shadow: 0 4px 24px rgba(99, 102, 241, 0.4);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      .btn:active {
        transform: scale(0.96);
        box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
      }
      .end-score {
        font-size: 72px;
        font-weight: 800;
        color: #fff;
        margin: 12px 0;
        text-align: center;
      }
      .end-label {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 2px;
        text-transform: uppercase;
        text-align: center;
      }
      .end-best {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.4);
        margin: 8px 0 36px;
        text-align: center;
      }
      .mobile-hint {
        display: none;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.35);
        margin-top: 16px;
        letter-spacing: 1px;
        text-align: center;
      }
      @media (max-width: 768px) {
        #score-panel {
          padding: 8px 20px;
          gap: 20px;
          border-radius: 12px;
        }
        #score-panel .label {
          font-size: 10px;
          letter-spacing: 1px;
        }
        #score-panel .value {
          font-size: 22px;
        }
        .title {
          font-size: 38px;
        }
        .subtitle {
          font-size: 14px;
          margin-bottom: 32px;
          max-width: 280px;
        }
        .btn {
          font-size: 16px;
          padding: 12px 36px;
        }
        .end-score {
          font-size: 52px;
        }
        .mobile-hint {
          display: block;
        }
      }
      @media (max-width: 400px) {
        #score-panel {
          padding: 6px 14px;
          gap: 14px;
          border-radius: 10px;
        }
        #score-panel .label {
          font-size: 9px;
          letter-spacing: 1px;
        }
        #score-panel .value {
          font-size: 18px;
        }
        .title {
          font-size: 30px;
        }
        .subtitle {
          font-size: 12px;
          margin-bottom: 24px;
          max-width: 240px;
        }
        .btn {
          font-size: 15px;
          padding: 10px 28px;
        }
        .end-score {
          font-size: 42px;
        }
        .end-best {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui-overlay">
      <div id="score-panel">
        <div class="item">
          <div class="label">分数</div>
          <div class="value" id="score-val">0</div>
        </div>
        <div class="item">
          <div class="label">大小</div>
          <div class="value" id="size-val">22</div>
        </div>
      </div>
      <div id="start-screen">
        <div class="title">大球吃小球</div>
        <div class="subtitle">用鼠标或手指控制你的球<br />吃掉比你小的球，躲避比你大的球</div>
        <button class="btn" id="start-btn">开始游戏</button>
        <div class="mobile-hint">💡 在屏幕上滑动来移动你的球</div>
      </div>
      <div id="end-screen">
        <div class="end-label">游戏结束</div>
        <div class="end-score" id="final-score">0</div>
        <div class="end-label">最终得分</div>
        <div class="end-best" id="best-score">最高纪录：0</div>
        <button class="btn" id="restart-btn">再来一局</button>
      </div>
    </div>
    <script>
      (function () {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreValEl = document.getElementById("score-val");
        const sizeValEl = document.getElementById("size-val");
        const startScreenEl = document.getElementById("start-screen");
        const endScreenEl = document.getElementById("end-screen");
        const finalScoreEl = document.getElementById("final-score");
        const bestScoreEl = document.getElementById("best-score");
        const startBtn = document.getElementById("start-btn");
        const restartBtn = document.getElementById("restart-btn");
        const CONFIG = {
          PLAYER_INITIAL_R: 22,
          PLAYER_COLORS: ["#60a5fa", "#3b82f6"],
          BALL_MIN_R: 8,
          BALL_MAX_R: 60,
          BALL_SPEED_MIN: 60,
          BALL_SPEED_MAX: 180,
          BALL_MARGIN: 80,
          SPAWN_RATE_INITIAL: 0.6,
          SPAWN_RATE_MIN: 0.15,
          SPAWN_RATE_DECAY: 0.03,
          DIFFICULTY_INTERVAL: 5,
          EAT_RATIO: 1.1,
          EAT_AREA_FACTOR: 0.8,
          PLAYER_SPEED_FACTOR: 8,
          PLAYER_MAX_SPEED: 600,
          PLAYER_SMOOTHING: 6,
          PLAYER_R_SMOOTHING: 5,
          TRAIL_MAX: 20,
          TRAIL_DECAY: 3,
          PARTICLE_DECAY_MIN: 1.5,
          PARTICLE_DECAY_MAX: 3,
          PARTICLE_SPEED_MIN: 80,
          PARTICLE_SPEED_MAX: 260,
          PARTICLE_R_MIN: 2,
          PARTICLE_R_MAX: 5,
          RIPPLE_MAX_R: 80,
          RIPPLE_SPEED: 4,
          RIPPLE_DECAY: 2.5,
          GRID_SIZE: 60,
          BG_DOTS: 30,
          INITIAL_BALL_COUNT: 15,
          INITIAL_BALL_R_MAX_FACTOR: 0.7,
          INITIAL_BALL_SAFE_DIST: 30,
          DESPAWN_MARGIN: 150,
        };
        const BALL_COLORS = [
          ["#f472b6", "#ec4899"],
          ["#fb923c", "#f97316"],
          ["#facc15", "#eab308"],
          ["#4ade80", "#22c55e"],
          ["#38bdf8", "#0ea5e9"],
          ["#818cf8", "#6366f1"],
          ["#c084fc", "#a855f7"],
          ["#f87171", "#ef4444"],
          ["#2dd4bf", "#14b8a6"],
          ["#a78bfa", "#8b5cf6"],
        ];
        let W, H;
        let gameState = "menu";
        let score = 0;
        let bestScore = parseInt(localStorage.getItem("bigball_best") || "0", 10);
        let player = null;
        let balls = [];
        let particles = [];
        let ripples = [];
        let mouseX = 0;
        let mouseY = 0;
        let spawnTimer = 0;
        let difficultyTimer = 0;
        let spawnRate = CONFIG.SPAWN_RATE_INITIAL;
        let lastTime = 0;
        let scorePopTimer = 0;
        let isMobileDevice = false;
        function detectMobile() {
          return /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);
        }
        function resize() {
          W = canvas.width = window.innerWidth;
          H = canvas.height = window.innerHeight;
        }
        function rand(a, b) {
          return Math.random() * (b - a) + a;
        }
        function dist(x1, y1, x2, y2) {
          return Math.hypot(x2 - x1, y2 - y1);
        }
        function lighten(hex, amt) {
          let r = parseInt(hex.slice(1, 3), 16);
          let g = parseInt(hex.slice(3, 5), 16);
          let b = parseInt(hex.slice(5, 7), 16);
          r = Math.min(255, r + amt);
          g = Math.min(255, g + amt);
          b = Math.min(255, b + amt);
          return `rgb(${r},${g},${b})`;
        }
        function createPlayer() {
          return {
            x: W / 2,
            y: H / 2,
            r: CONFIG.PLAYER_INITIAL_R,
            targetR: CONFIG.PLAYER_INITIAL_R,
            vx: 0,
            vy: 0,
            trail: [],
          };
        }
        function spawnBall() {
          const r = rand(CONFIG.BALL_MIN_R, CONFIG.BALL_MAX_R);
          const side = Math.floor(rand(0, 4));
          const margin = CONFIG.BALL_MARGIN;
          let x, y;
          if (side === 0) {
            x = -margin;
            y = rand(0, H);
          } else if (side === 1) {
            x = W + margin;
            y = rand(0, H);
          } else if (side === 2) {
            x = rand(0, W);
            y = -margin;
          } else {
            x = rand(0, W);
            y = H + margin;
          }
          let targetX, targetY;
          if (side === 0) targetX = rand(W * 0.3, W + margin);
          else if (side === 1) targetX = rand(-margin, W * 0.7);
          else targetX = rand(0, W);
          if (side === 2) targetY = rand(H * 0.3, H + margin);
          else if (side === 3) targetY = rand(-margin, H * 0.7);
          else targetY = rand(0, H);
          const angle = Math.atan2(targetY - y, targetX - x) + rand(-0.3, 0.3);
          const speed = rand(CONFIG.BALL_SPEED_MIN, CONFIG.BALL_SPEED_MAX);
          const vx = Math.cos(angle) * speed;
          const vy = Math.sin(angle) * speed;
          const color = BALL_COLORS[Math.floor(rand(0, BALL_COLORS.length))];
          balls.push({
            x,
            y,
            r,
            vx,
            vy,
            color,
            alive: true,
            opacity: 1,
            pulse: rand(0, Math.PI * 2),
          });
        }
        function spawnSafeInitialBall() {
          const maxR = Math.max(CONFIG.BALL_MIN_R, Math.min(player.targetR * CONFIG.INITIAL_BALL_R_MAX_FACTOR, CONFIG.BALL_MAX_R * 0.5));
          const r = rand(CONFIG.BALL_MIN_R, maxR);
          const color = BALL_COLORS[Math.floor(rand(0, BALL_COLORS.length))];
          const speed = rand(CONFIG.BALL_SPEED_MIN, CONFIG.BALL_SPEED_MAX);
          const angle = rand(0, Math.PI * 2);
          const vx = Math.cos(angle) * speed;
          const vy = Math.sin(angle) * speed;
          let x, y;
          let attempts = 0;
          const maxAttempts = 50;
          do {
            x = rand(r + 10, W - r - 10);
            y = rand(r + 10, H - r - 10);
            attempts++;
          } while (attempts < maxAttempts && dist(x, y, player.x, player.y) < player.r + r + CONFIG.INITIAL_BALL_SAFE_DIST);
          balls.push({
            x,
            y,
            r,
            vx,
            vy,
            color,
            alive: true,
            opacity: 1,
            pulse: rand(0, Math.PI * 2),
          });
        }
        function emitParticles(x, y, color, count) {
          for (let i = 0; i < count; i++) {
            const angle = rand(0, Math.PI * 2);
            const speed = rand(CONFIG.PARTICLE_SPEED_MIN, CONFIG.PARTICLE_SPEED_MAX);
            particles.push({
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              r: rand(CONFIG.PARTICLE_R_MIN, CONFIG.PARTICLE_R_MAX),
              life: 1,
              decay: rand(CONFIG.PARTICLE_DECAY_MIN, CONFIG.PARTICLE_DECAY_MAX),
              color,
            });
          }
        }
        function emitRipple(x, y, color) {
          ripples.push({
            x,
            y,
            r: 5,
            maxR: CONFIG.RIPPLE_MAX_R,
            life: 1,
            color,
          });
        }
        function initGame() {
          player = createPlayer();
          balls = [];
          particles = [];
          ripples = [];
          score = 0;
          spawnTimer = 0;
          difficultyTimer = 0;
          spawnRate = CONFIG.SPAWN_RATE_INITIAL;
          mouseX = W / 2;
          mouseY = H / 2;
          scorePopTimer = 0;
          for (let i = 0; i < CONFIG.INITIAL_BALL_COUNT; i++) {
            spawnSafeInitialBall();
          }
          updateUI();
        }
        function updateUI() {
          scoreValEl.textContent = score;
          sizeValEl.textContent = Math.round(player ? player.r : CONFIG.PLAYER_INITIAL_R);
        }
        function triggerScorePop() {
          scorePopTimer = 0.15;
          scoreValEl.classList.add("pop");
        }
        function gameOver() {
          gameState = "dead";
          emitParticles(player.x, player.y, CONFIG.PLAYER_COLORS[0], 40);
          emitRipple(player.x, player.y, CONFIG.PLAYER_COLORS[0]);
          if (score > bestScore) {
            bestScore = score;
            localStorage.setItem("bigball_best", bestScore);
          }
          setTimeout(() => {
            finalScoreEl.textContent = score;
            bestScoreEl.textContent = "最高纪录：" + bestScore;
            endScreenEl.style.display = "flex";
          }, 600);
        }
        function updatePlayerMovement(dt) {
          const dx = mouseX - player.x;
          const dy = mouseY - player.y;
          const d = Math.hypot(dx, dy);
          const speed = Math.min(d * CONFIG.PLAYER_SPEED_FACTOR, CONFIG.PLAYER_MAX_SPEED);
          if (d > 1) {
            player.vx += ((dx / d) * speed - player.vx) * Math.min(dt * CONFIG.PLAYER_SMOOTHING, 1);
            player.vy += ((dy / d) * speed - player.vy) * Math.min(dt * CONFIG.PLAYER_SMOOTHING, 1);
          }
          player.x += player.vx * dt;
          player.y += player.vy * dt;
          player.r += (player.targetR - player.r) * Math.min(dt * CONFIG.PLAYER_R_SMOOTHING, 1);
          player.trail.push({ x: player.x, y: player.y, r: player.r, life: 1 });
          if (player.trail.length > CONFIG.TRAIL_MAX) player.trail.shift();
          for (let t of player.trail) t.life -= dt * CONFIG.TRAIL_DECAY;
          player.trail = player.trail.filter((t) => t.life > 0);
        }
        function updateSpawning(dt) {
          difficultyTimer += dt;
          if (difficultyTimer > CONFIG.DIFFICULTY_INTERVAL) {
            difficultyTimer = 0;
            spawnRate = Math.max(CONFIG.SPAWN_RATE_MIN, spawnRate - CONFIG.SPAWN_RATE_DECAY);
          }
          spawnTimer += dt;
          if (spawnTimer >= spawnRate) {
            spawnTimer = 0;
            spawnBall();
          }
        }
        function updateBalls(dt) {
          const margin = CONFIG.DESPAWN_MARGIN;
          for (let b of balls) {
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            b.pulse += dt * 2;
            if (b.x < -margin || b.x > W + margin || b.y < -margin || b.y > H + margin) {
              b.alive = false;
            }
            if (!b.alive) continue;
            const dd = dist(player.x, player.y, b.x, b.y);
            if (dd < player.r + b.r) {
              if (player.r > b.r * CONFIG.EAT_RATIO) {
                const area = Math.PI * b.r * b.r;
                player.targetR = Math.sqrt((Math.PI * player.targetR * player.targetR + area * CONFIG.EAT_AREA_FACTOR) / Math.PI);
                score += Math.round(b.r * 2);
                b.alive = false;
                emitParticles(b.x, b.y, b.color[0], Math.round(b.r * 0.6));
                emitRipple(b.x, b.y, b.color[0]);
                triggerScorePop();
              } else if (b.r > player.r * CONFIG.EAT_RATIO) {
                gameOver();
                return true;
              }
            }
          }
          balls = balls.filter((b) => b.alive);
          return false;
        }
        function updateParticles(dt) {
          for (let p of particles) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vx *= Math.pow(0.05, dt);
            p.vy *= Math.pow(0.05, dt);
            p.life -= p.decay * dt;
            p.r *= Math.pow(0.3, dt);
          }
          particles = particles.filter((p) => p.life > 0);
        }
        function updateRipples(dt) {
          for (let r of ripples) {
            r.r += (r.maxR - r.r) * Math.min(dt * CONFIG.RIPPLE_SPEED, 1);
            r.life -= dt * CONFIG.RIPPLE_DECAY;
          }
          ripples = ripples.filter((r) => r.life > 0);
        }
        function updateUIAnimations(dt) {
          if (scorePopTimer > 0) {
            scorePopTimer -= dt;
            if (scorePopTimer <= 0) {
              scoreValEl.classList.remove("pop");
            }
          }
          updateUI();
        }
        function update(dt) {
          if (gameState !== "playing") return;
          updatePlayerMovement(dt);
          updateSpawning(dt);
          const died = updateBalls(dt);
          if (died) return;
          updateParticles(dt);
          updateRipples(dt);
          updateUIAnimations(dt);
        }
        function drawBackground() {
          const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
          grad.addColorStop(0, "#111827");
          grad.addColorStop(1, "#0a0e1a");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, W, H);
          ctx.strokeStyle = "rgba(255,255,255,0.03)";
          ctx.lineWidth = 1;
          const gs = CONFIG.GRID_SIZE;
          for (let x = gs; x < W; x += gs) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
          }
          for (let y = gs; y < H; y += gs) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
          }
          const time = performance.now() * 0.001;
          ctx.fillStyle = "rgba(255,255,255,0.04)";
          for (let i = 0; i < CONFIG.BG_DOTS; i++) {
            const bx = (Math.sin(i * 3.7 + time * 0.1) * 0.5 + 0.5) * W;
            const by = (Math.cos(i * 2.3 + time * 0.15) * 0.5 + 0.5) * H;
            ctx.beginPath();
            ctx.arc(bx, by, 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        function drawBall(x, y, r, color, pulse) {
          const pr = r + Math.sin(pulse || 0) * r * 0.03;
          const glow = ctx.createRadialGradient(x, y, pr * 0.5, x, y, pr * 2.2);
          glow.addColorStop(0, color[0] + "30");
          glow.addColorStop(1, color[0] + "00");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(x, y, pr * 2.2, 0, Math.PI * 2);
          ctx.fill();
          const grad = ctx.createRadialGradient(x - pr * 0.3, y - pr * 0.3, pr * 0.1, x, y, pr);
          grad.addColorStop(0, lighten(color[0], 40));
          grad.addColorStop(0.5, color[0]);
          grad.addColorStop(1, color[1]);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(x, y, pr, 0, Math.PI * 2);
          ctx.fill();
          const hlGrad = ctx.createRadialGradient(x - pr * 0.35, y - pr * 0.35, 0, x - pr * 0.2, y - pr * 0.2, pr * 0.6);
          hlGrad.addColorStop(0, "rgba(255,255,255,0.5)");
          hlGrad.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = hlGrad;
          ctx.beginPath();
          ctx.arc(x, y, pr, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.15)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(x, y, pr - 0.75, 0, Math.PI * 2);
          ctx.stroke();
        }
        function drawPlayer() {
          if (!player) return;
          for (let t of player.trail) {
            ctx.fillStyle = `rgba(96,165,250,${t.life * 0.1})`;
            ctx.beginPath();
            ctx.arc(t.x, t.y, t.r * t.life * 0.6, 0, Math.PI * 2);
            ctx.fill();
          }
          drawBall(player.x, player.y, player.r, CONFIG.PLAYER_COLORS, performance.now() * 0.003);
          ctx.strokeStyle = "rgba(96,165,250,0.2)";
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          ctx.beginPath();
          ctx.arc(player.x, player.y, player.r + 6, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
        }
        function drawBalls() {
          for (let b of balls) {
            drawBall(b.x, b.y, b.r, b.color, b.pulse);
          }
        }
        function drawParticles() {
          for (let p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(p.r, 0.5), 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
        function drawRipples() {
          for (let r of ripples) {
            ctx.globalAlpha = r.life * 0.4;
            ctx.strokeStyle = r.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }
        function drawCursor() {
          if (gameState !== "playing") return;
          ctx.strokeStyle = "rgba(255,255,255,0.4)";
          ctx.lineWidth = 1.5;
          const s = 8;
          ctx.beginPath();
          ctx.moveTo(mouseX - s, mouseY);
          ctx.lineTo(mouseX + s, mouseY);
          ctx.moveTo(mouseX, mouseY - s);
          ctx.lineTo(mouseX, mouseY + s);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(mouseX, mouseY, 4, 0, Math.PI * 2);
          ctx.stroke();
        }
        function draw() {
          drawBackground();
          if (gameState === "playing" || gameState === "dead") {
            drawRipples();
            drawBalls();
            drawParticles();
            drawPlayer();
            drawCursor();
          }
        }
        function loop(time) {
          const dt = Math.min((time - lastTime) / 1000, 0.05);
          lastTime = time;
          update(dt);
          draw();
          requestAnimationFrame(loop);
        }
        function handlePointerMove(clientX, clientY) {
          mouseX = clientX;
          mouseY = clientY;
        }
        function setupEvents() {
          canvas.addEventListener("mousemove", (e) => {
            if (isMobileDevice) return;
            handlePointerMove(e.clientX, e.clientY);
          });
          canvas.addEventListener(
            "touchstart",
            (e) => {
              e.preventDefault();
              if (e.touches.length > 0) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
              }
            },
            { passive: false },
          );
          canvas.addEventListener(
            "touchmove",
            (e) => {
              e.preventDefault();
              if (e.touches.length > 0) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
              }
            },
            { passive: false },
          );
          canvas.addEventListener(
            "touchend",
            (e) => {
              e.preventDefault();
            },
            { passive: false },
          );
          canvas.addEventListener(
            "touchcancel",
            (e) => {
              e.preventDefault();
            },
            { passive: false },
          );
          startBtn.addEventListener("click", () => {
            startScreenEl.style.display = "none";
            initGame();
            gameState = "playing";
          });
          startBtn.addEventListener("touchend", (e) => {
            e.preventDefault();
            e.stopPropagation();
            startScreenEl.style.display = "none";
            initGame();
            gameState = "playing";
          });
          restartBtn.addEventListener("click", () => {
            endScreenEl.style.display = "none";
            initGame();
            gameState = "playing";
          });
          restartBtn.addEventListener("touchend", (e) => {
            e.preventDefault();
            e.stopPropagation();
            endScreenEl.style.display = "none";
            initGame();
            gameState = "playing";
          });
          window.addEventListener("resize", resize);
        }
        function init() {
          isMobileDevice = detectMobile();
          resize();
          setupEvents();
          bestScoreEl.textContent = "最高纪录：" + bestScore;
          lastTime = performance.now();
          mouseX = W / 2;
          mouseY = H / 2;
          requestAnimationFrame(loop);
        }
        init();
      })();
    </script>
  </body>
</html>
