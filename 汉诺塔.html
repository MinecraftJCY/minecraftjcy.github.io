<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>汉诺塔</title>
    <style>
      :root {
        --bg: #eaf3e8;
        --bg-radial: #dce8d8;
        --surface: #f7faf6;
        --surface-elevated: #ffffff;
        --text: #2e3d34;
        --text-dim: #5a6e61;
        --text-heading: #3a523e;
        --accent: #8fa88a;
        --accent-hover: #a4be9f;
        --accent-active: #6b8566;
        --accent-glow: #b6ccb0;
        --danger: #c07a7a;
        --success: #6b9e78;
        --rod-light: #cfc0b0;
        --rod-mid: #a09080;
        --rod-dark: #6b5d4e;
        --base-light: #b8a898;
        --base-dark: #7d6e5e;
        --border-subtle: rgba(143, 168, 138, 0.15);
        --border-control: rgba(143, 168, 138, 0.3);
        --border-outline: rgba(143, 168, 138, 0.4);
        --border-outline-hover: rgba(143, 168, 138, 0.6);
        --shadow-card: 0 8px 24px rgba(46, 61, 52, 0.12), 0 2px 6px rgba(46, 61, 52, 0.08);
        --shadow-disk: 0 3px 6px rgba(46, 61, 52, 0.15), 0 1px 2px rgba(255, 255, 255, 0.5) inset;
        --shadow-disk-lift: 0 8px 18px rgba(46, 61, 52, 0.25), 0 0 12px rgba(143, 168, 138, 0.5);
        --shadow-btn: 0 4px 10px rgba(46, 61, 52, 0.1);
        --shadow-btn-hover: 0 6px 14px rgba(46, 61, 52, 0.15);
        --shadow-rod-inset: inset 2px 0 4px rgba(255, 255, 255, 0.25), inset -2px 0 4px rgba(0, 0, 0, 0.25);
        --shadow-base: 0 6px 14px rgba(46, 61, 52, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.3);
        --disk-brightness: 1;
        --disk-saturate: 1;
        --overlay-bg: rgba(46, 61, 52, 0.35);
        --victory-bg: #ffffff;
        --victory-text: #4a6b4f;
        --tower-width: clamp(95px, 29vw, 185px);
        --tower-height: clamp(230px, 45vh, 360px);
        --disk-thickness: clamp(20px, 3.6vh, 30px);
        --border-radius-sm: 8px;
        --border-radius-md: 14px;
        --border-radius-lg: 22px;
        --font-sans: "Inter", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", system-ui, sans-serif;
        --transition-smooth: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-bounce: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        --transition-theme: 0.35s ease;
      }
      [data-theme="dark"] {
        --bg: #1b241e;
        --bg-radial: #161f19;
        --surface: #222c26;
        --surface-elevated: #2a352e;
        --text: #c5d1c8;
        --text-dim: #8a9c8e;
        --text-heading: #9ab89e;
        --accent: #6b8a70;
        --accent-hover: #7d9c82;
        --accent-active: #557058;
        --accent-glow: #4a634e;
        --danger: #b07070;
        --success: #5a8a68;
        --rod-light: #5c5248;
        --rod-mid: #4a4038;
        --rod-dark: #332b24;
        --base-light: #50463c;
        --base-dark: #3a322a;
        --border-subtle: rgba(120, 140, 125, 0.15);
        --border-control: rgba(120, 140, 125, 0.3);
        --border-outline: rgba(120, 140, 125, 0.4);
        --border-outline-hover: rgba(120, 140, 125, 0.6);
        --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.3), 0 2px 6px rgba(0, 0, 0, 0.2);
        --shadow-disk: 0 3px 6px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(255, 255, 255, 0.08) inset;
        --shadow-disk-lift: 0 8px 18px rgba(0, 0, 0, 0.4), 0 0 12px rgba(107, 138, 112, 0.45);
        --shadow-btn: 0 4px 10px rgba(0, 0, 0, 0.25);
        --shadow-btn-hover: 0 6px 14px rgba(0, 0, 0, 0.35);
        --shadow-rod-inset: inset 2px 0 4px rgba(255, 255, 255, 0.08), inset -2px 0 4px rgba(0, 0, 0, 0.4);
        --shadow-base: 0 6px 14px rgba(0, 0, 0, 0.35), inset 0 1px 1px rgba(255, 255, 255, 0.08);
        --disk-brightness: 0.72;
        --disk-saturate: 0.65;
        --overlay-bg: rgba(10, 16, 12, 0.55);
        --victory-bg: #2a352e;
        --victory-text: #9ab89e;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: radial-gradient(ellipse at 50% 30%, var(--bg-radial) 0%, var(--bg) 75%);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: clamp(10px, 2vw, 16px);
        font-family: var(--font-sans);
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        transition:
          background var(--transition-theme),
          color var(--transition-theme);
      }
      .game-container {
        background: var(--surface);
        border-radius: var(--border-radius-lg);
        padding: clamp(18px, 3.5vw, 30px) clamp(14px, 2.8vw, 26px);
        box-shadow: var(--shadow-card);
        width: 100%;
        max-width: 720px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(18px, 2.5vh, 24px);
        border: 1px solid var(--border-subtle);
        transition:
          background var(--transition-theme),
          box-shadow var(--transition-theme),
          border var(--transition-theme);
      }
      .game-header {
        text-align: center;
        width: 100%;
      }
      .game-title {
        font-size: clamp(22px, 5vw, 32px);
        font-weight: 700;
        letter-spacing: 0.03em;
        background: linear-gradient(180deg, #5a7a5e 0%, #3a523e 80%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 1px 2px rgba(46, 61, 52, 0.2));
        margin-bottom: 4px;
      }
      [data-theme="dark"] .game-title {
        background: linear-gradient(180deg, #8aae8e 0%, #6a8e6e 80%);
        -webkit-background-clip: text;
        background-clip: text;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.3));
      }
      .game-subtitle {
        font-size: clamp(12px, 2vw, 15px);
        color: var(--text-dim);
        letter-spacing: 0.04em;
        font-weight: 400;
        transition: color var(--transition-theme);
      }
      .control-panel {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: clamp(8px, 1.5vw, 14px);
        width: 100%;
      }
      .layer-selector {
        display: flex;
        align-items: center;
        gap: clamp(4px, 0.8vw, 6px);
        background: var(--surface-elevated);
        border-radius: 40px;
        padding: clamp(4px, 0.7vw, 5px) clamp(10px, 1.8vw, 14px);
        border: 1px solid var(--border-control);
        box-shadow: 0 2px 8px rgba(46, 61, 52, 0.08);
        transition:
          background var(--transition-theme),
          border var(--transition-theme),
          box-shadow var(--transition-theme);
      }
      .btn-icon {
        width: clamp(30px, 5vw, 36px);
        height: clamp(30px, 5vw, 36px);
        border-radius: 50%;
        border: none;
        background: rgba(143, 168, 138, 0.12);
        color: var(--text);
        font-size: clamp(1.1rem, 2vw, 1.4rem);
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition-smooth);
        box-shadow: 0 2px 6px rgba(46, 61, 52, 0.1);
        line-height: 1;
        flex-shrink: 0;
      }
      .btn-icon:hover:not(:disabled) {
        background: rgba(143, 168, 138, 0.25);
        transform: scale(1.05);
        box-shadow: 0 4px 10px rgba(46, 61, 52, 0.15);
      }
      .btn-icon:active:not(:disabled) {
        transform: scale(0.92);
        background: rgba(143, 168, 138, 0.35);
      }
      .btn-icon:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        pointer-events: none;
      }
      .layer-number {
        font-size: clamp(1.2rem, 2.4vw, 1.6rem);
        font-weight: 700;
        min-width: clamp(22px, 4vw, 28px);
        text-align: center;
        color: #4a6b4f;
        letter-spacing: 0.04em;
        text-shadow: 0 0 8px rgba(143, 168, 138, 0.3);
        transition: color var(--transition-theme);
      }
      [data-theme="dark"] .layer-number {
        color: #8aae8e;
        text-shadow: 0 0 8px rgba(107, 138, 112, 0.3);
      }
      .stats {
        display: flex;
        align-items: baseline;
        gap: clamp(6px, 1.2vw, 12px);
        background: var(--surface-elevated);
        border-radius: 40px;
        padding: clamp(5px, 0.9vh, 8px) clamp(10px, 1.8vw, 18px);
        border: 1px solid var(--border-control);
        box-shadow: 0 2px 8px rgba(46, 61, 52, 0.08);
        transition:
          background var(--transition-theme),
          border var(--transition-theme),
          box-shadow var(--transition-theme);
      }
      .stat-item {
        display: flex;
        align-items: baseline;
        gap: clamp(2px, 0.4vw, 4px);
        font-size: clamp(0.75rem, 1.4vw, 0.9rem);
        color: var(--text-dim);
        letter-spacing: 0.03em;
        transition: color var(--transition-theme);
      }
      .stat-value {
        font-weight: 700;
        font-size: clamp(1.1rem, 2vw, 1.4rem);
        color: #4a6b4f;
        line-height: 1;
        text-shadow: 0 0 6px rgba(143, 168, 138, 0.3);
        transition: color var(--transition-theme);
      }
      [data-theme="dark"] .stat-value {
        color: #8aae8e;
        text-shadow: 0 0 6px rgba(107, 138, 112, 0.3);
      }
      .stat-optimal {
        font-size: clamp(0.65rem, 1.1vw, 0.75rem);
        opacity: 0.8;
      }
      .action-buttons {
        display: flex;
        gap: clamp(6px, 1vw, 10px);
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn {
        border: none;
        border-radius: 40px;
        padding: clamp(9px, 1.5vh, 12px) clamp(14px, 2.5vw, 22px);
        font-weight: 600;
        font-family: inherit;
        font-size: clamp(0.75rem, 1.5vw, 0.9rem);
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: all var(--transition-smooth);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow: var(--shadow-btn);
        white-space: nowrap;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active:not(:disabled) {
        transform: scale(0.94);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
      }
      .btn-outline {
        background: rgba(143, 168, 138, 0.08);
        color: var(--text);
        border: 1px solid var(--border-outline);
      }
      .btn-outline:hover:not(:disabled) {
        background: rgba(143, 168, 138, 0.18);
        border-color: var(--border-outline-hover);
        box-shadow: var(--shadow-btn-hover);
      }
      .btn-accent {
        background: linear-gradient(135deg, #8fa88a 0%, #6b8566 100%);
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.25);
        font-weight: 700;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
      }
      .btn-accent:hover:not(:disabled) {
        background: linear-gradient(135deg, #a4be9f 0%, #7d9678 100%);
        box-shadow: 0 8px 18px rgba(143, 168, 138, 0.35);
        transform: translateY(-1px);
      }
      [data-theme="dark"] .btn-accent {
        background: linear-gradient(135deg, #6b8a70 0%, #557058 100%);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
      [data-theme="dark"] .btn-accent:hover:not(:disabled) {
        background: linear-gradient(135deg, #7d9c82 0%, #638268 100%);
        box-shadow: 0 8px 18px rgba(107, 138, 112, 0.35);
      }
      .theme-toggle {
        width: clamp(34px, 5.5vw, 42px);
        height: clamp(34px, 5.5vw, 42px);
        border-radius: 50%;
        border: 1px solid var(--border-outline);
        background: var(--surface-elevated);
        cursor: pointer;
        font-size: clamp(1.1rem, 2vw, 1.4rem);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition-smooth);
        box-shadow: 0 2px 8px rgba(46, 61, 52, 0.08);
        flex-shrink: 0;
        line-height: 1;
        padding: 0;
      }
      .theme-toggle:hover {
        transform: scale(1.08);
        box-shadow: var(--shadow-btn-hover);
        border-color: var(--border-outline-hover);
      }
      .theme-toggle:active {
        transform: scale(0.9);
      }
      .game-area {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: clamp(10px, 2.5vw, 24px);
        width: 100%;
        padding: 8px 0 4px;
      }
      .tower {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: var(--tower-width);
        cursor: pointer;
        position: relative;
        transition: filter 0.2s;
        flex-shrink: 0;
      }
      .tower:hover .tower-rod-bg {
        filter: brightness(1.05);
      }
      .tower.tower-selected .tower-rod-bg {
        filter: brightness(1.15) drop-shadow(0 0 8px rgba(143, 168, 138, 0.7));
      }
      [data-theme="dark"] .tower.tower-selected .tower-rod-bg {
        filter: brightness(1.25) drop-shadow(0 0 10px rgba(107, 138, 112, 0.7));
      }
      .tower.tower-invalid {
        animation: shake 0.45s ease;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-7px);
        }
        40% {
          transform: translateX(7px);
        }
        60% {
          transform: translateX(-4px);
        }
        80% {
          transform: translateX(4px);
        }
      }
      .tower-rod-container {
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
      }
      .tower-rod-bg {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: clamp(7px, 1.6vw, 12px);
        height: calc(var(--tower-height) - 4px);
        background: linear-gradient(180deg, var(--rod-light) 0%, var(--rod-mid) 55%, var(--rod-dark) 100%);
        border-radius: 6px 6px 0 0;
        z-index: 0;
        pointer-events: none;
        box-shadow: var(--shadow-rod-inset);
        transition:
          filter var(--transition-smooth),
          background var(--transition-theme);
      }
      .tower-disks-wrapper {
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        width: 100%;
        min-height: var(--tower-height);
        justify-content: flex-start;
        padding-bottom: 0;
        z-index: 2;
        pointer-events: none;
      }
      .tower-base {
        width: 100%;
        height: clamp(10px, 1.8vh, 14px);
        background: linear-gradient(180deg, var(--base-light) 0%, var(--base-dark) 100%);
        border-radius: 6px;
        z-index: 1;
        pointer-events: none;
        box-shadow: var(--shadow-base);
        flex-shrink: 0;
        transition:
          background var(--transition-theme),
          box-shadow var(--transition-theme);
      }
      .tower-label {
        font-size: clamp(14px, 2.4vw, 17px);
        font-weight: 700;
        color: #5c6e5e;
        margin-top: clamp(8px, 1.2vh, 10px);
        letter-spacing: 0.08em;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
        transition: color var(--transition-theme);
      }
      [data-theme="dark"] .tower-label {
        color: #8a9c8e;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }
      .disk {
        height: var(--disk-thickness);
        border-radius: var(--border-radius-md);
        flex-shrink: 0;
        pointer-events: auto;
        cursor: grab;
        transition:
          transform var(--transition-bounce),
          box-shadow var(--transition-smooth),
          filter var(--transition-smooth);
        box-shadow: var(--shadow-disk);
        z-index: 3;
        position: relative;
        filter: brightness(var(--disk-brightness)) saturate(var(--disk-saturate));
      }
      .disk:active {
        cursor: grabbing;
      }
      .disk.disk-selected {
        filter: brightness(calc(var(--disk-brightness) * 1.15)) saturate(calc(var(--disk-saturate) * 1.25));
        box-shadow: var(--shadow-disk-lift);
        z-index: 12;
        transform: translateY(-8px) scale(1.02);
      }
      .disk:hover:not(.disk-selected) {
        filter: brightness(calc(var(--disk-brightness) * 1.08)) saturate(calc(var(--disk-saturate) * 1.05));
        box-shadow:
          0 5px 10px rgba(46, 61, 52, 0.2),
          0 1px 3px rgba(255, 255, 255, 0.4) inset;
      }
      [data-theme="dark"] .disk:hover:not(.disk-selected) {
        box-shadow:
          0 5px 10px rgba(0, 0, 0, 0.3),
          0 1px 3px rgba(255, 255, 255, 0.06) inset;
      }
      .disk-0 {
        background: linear-gradient(180deg, #e0a0a0 0%, #c07878 55%, #9a5a5a 100%);
      }
      .disk-1 {
        background: linear-gradient(180deg, #e0c0a0 0%, #c09870 55%, #9a7a50 100%);
      }
      .disk-2 {
        background: linear-gradient(180deg, #d8d0a0 0%, #b8b070 55%, #908a50 100%);
      }
      .disk-3 {
        background: linear-gradient(180deg, #a0b8d0 0%, #7090b0 55%, #506a80 100%);
      }
      .disk-4 {
        background: linear-gradient(180deg, #b0a0c8 0%, #8878a8 55%, #605080 100%);
      }
      .disk-5 {
        background: linear-gradient(180deg, #a0c8b0 0%, #70a080 55%, #507860 100%);
      }
      .disk-6 {
        background: linear-gradient(180deg, #d8a0c0 0%, #b07098 55%, #885070 100%);
      }
      .disk-7 {
        background: linear-gradient(180deg, #c0b0d0 0%, #9888b0 55%, #706090 100%);
      }
      .victory-overlay {
        position: fixed;
        inset: 0;
        background: var(--overlay-bg);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        animation: fade-in 0.25s ease;
        transition: background var(--transition-theme);
      }
      .victory-overlay.hidden {
        display: none;
      }
      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .victory-card {
        background: var(--victory-bg);
        border-radius: var(--border-radius-lg);
        padding: clamp(24px, 4vw, 32px) clamp(20px, 3.5vw, 28px);
        text-align: center;
        box-shadow:
          0 12px 30px rgba(46, 61, 52, 0.2),
          0 0 0 1px rgba(143, 168, 138, 0.2);
        animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        max-width: 92vw;
        width: 340px;
        transition:
          background var(--transition-theme),
          box-shadow var(--transition-theme);
      }
      @keyframes pop-in {
        from {
          transform: scale(0.7) translateY(30px);
          opacity: 0;
        }
        to {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }
      .victory-emoji {
        font-size: clamp(2.4rem, 5vw, 3.2rem);
        display: block;
        margin-bottom: 8px;
        animation: float 2s infinite ease-in-out;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .victory-title {
        font-size: clamp(1.4rem, 3vw, 1.8rem);
        font-weight: 700;
        color: var(--victory-text);
        letter-spacing: 0.04em;
        margin-bottom: 10px;
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
        transition: color var(--transition-theme);
      }
      [data-theme="dark"] .victory-title {
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }
      .victory-detail {
        font-size: clamp(0.85rem, 1.6vw, 0.95rem);
        color: var(--text-dim);
        margin: 6px 0;
        letter-spacing: 0.03em;
        transition: color var(--transition-theme);
      }
      .victory-perfect {
        color: #5a8a6a;
        font-weight: 700;
        font-size: clamp(0.9rem, 1.7vw, 1rem);
        text-shadow: 0 0 6px rgba(106, 158, 120, 0.3);
      }
      [data-theme="dark"] .victory-perfect {
        color: #7aae8a;
        text-shadow: 0 0 6px rgba(122, 174, 138, 0.3);
      }
      .victory-btn {
        margin-top: 22px;
        width: 100%;
        justify-content: center;
      }
      @media (max-width: 500px) {
        .control-panel {
          gap: 6px;
        }
        .btn {
          padding: 9px 14px;
          font-size: 0.78rem;
        }
        .btn-icon {
          width: 30px;
          height: 30px;
          font-size: 1.1rem;
        }
        .layer-number {
          font-size: 1.2rem;
          min-width: 20px;
        }
        .stats {
          padding: 5px 10px;
          gap: 6px;
        }
        .stat-value {
          font-size: 1.1rem;
        }
        .tower-label {
          font-size: 12px;
          margin-top: 5px;
        }
        .theme-toggle {
          width: 34px;
          height: 34px;
          font-size: 1.1rem;
        }
        .game-area {
          gap: 6px;
        }
        .tower {
          --tower-width: clamp(78px, 28vw, 120px);
          width: var(--tower-width);
        }
      }
      @media (max-width: 370px) {
        .game-area {
          gap: 3px;
        }
        .tower {
          --tower-width: clamp(68px, 27vw, 90px);
          width: var(--tower-width);
        }
        .tower-label {
          font-size: 10px;
          margin-top: 4px;
        }
        .btn {
          padding: 7px 10px;
          font-size: 0.7rem;
        }
        .btn-icon {
          width: 26px;
          height: 26px;
          font-size: 1rem;
        }
        .layer-number {
          font-size: 1rem;
          min-width: 18px;
        }
        .stat-value {
          font-size: 1rem;
        }
        .stat-item {
          font-size: 0.7rem;
        }
        .theme-toggle {
          width: 28px;
          height: 28px;
          font-size: 1rem;
        }
        .control-panel {
          gap: 4px;
        }
        .stats {
          padding: 4px 8px;
          gap: 4px;
        }
        .layer-selector {
          padding: 3px 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <div class="game-header">
        <div class="game-title">汉 诺 塔</div>
        <div class="game-subtitle">将所有圆盘从 A 柱移至 C 柱</div>
      </div>
      <div class="control-panel" id="controlPanel">
        <div class="layer-selector">
          <button class="btn-icon" id="btnDecrease" aria-label="减少层数">−</button>
          <span class="layer-number" id="layerDisplay">3</span>
          <button class="btn-icon" id="btnIncrease" aria-label="增加层数">+</button>
        </div>
        <div class="stats">
          <div class="stat-item">
            <span>步数</span>
            <span class="stat-value" id="movesCount">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-optimal">最优</span>
            <span class="stat-value" id="movesOptimal">7</span>
          </div>
        </div>
        <div class="action-buttons">
          <button class="btn btn-outline" id="btnReset">🔄 重置</button>
          <button class="btn btn-accent" id="btnAutoSolve">⚡ 自动求解</button>
        </div>
        <button class="theme-toggle" id="btnThemeToggle" aria-label="切换深色/浅色模式" title="切换深色/浅色模式">🌙</button>
      </div>
      <div class="game-area" id="gameArea">
        <div class="tower" data-tower="0" id="tower0">
          <div class="tower-rod-container">
            <div class="tower-rod-bg"></div>
            <div class="tower-disks-wrapper" id="disksWrapper0"></div>
          </div>
          <div class="tower-base"></div>
          <div class="tower-label">A</div>
        </div>
        <div class="tower" data-tower="1" id="tower1">
          <div class="tower-rod-container">
            <div class="tower-rod-bg"></div>
            <div class="tower-disks-wrapper" id="disksWrapper1"></div>
          </div>
          <div class="tower-base"></div>
          <div class="tower-label">B</div>
        </div>
        <div class="tower" data-tower="2" id="tower2">
          <div class="tower-rod-container">
            <div class="tower-rod-bg"></div>
            <div class="tower-disks-wrapper" id="disksWrapper2"></div>
          </div>
          <div class="tower-base"></div>
          <div class="tower-label">C</div>
        </div>
      </div>
    </div>
    <div class="victory-overlay hidden" id="victoryOverlay">
      <div class="victory-card">
        <span class="victory-emoji">🏆</span>
        <div class="victory-title">完美通关</div>
        <div class="victory-detail" id="victoryMovesDetail"></div>
        <div class="victory-detail" id="victoryOptimalDetail"></div>
        <button class="btn btn-accent victory-btn" id="btnVictoryRestart">✨ 再来一局</button>
      </div>
    </div>
    <script>
      (() => {
        const THEME_KEY = "hanoi-theme-preference";
        const DISK_MIN = 3;
        const DISK_MAX = 8;
        const TOWER_COUNT = 3;
        const TARGET_TOWER = 2;
        const dom = {
          btnDecrease: document.getElementById("btnDecrease"),
          btnIncrease: document.getElementById("btnIncrease"),
          btnReset: document.getElementById("btnReset"),
          btnAutoSolve: document.getElementById("btnAutoSolve"),
          btnVictoryRestart: document.getElementById("btnVictoryRestart"),
          btnThemeToggle: document.getElementById("btnThemeToggle"),
          layerDisplay: document.getElementById("layerDisplay"),
          movesCount: document.getElementById("movesCount"),
          movesOptimal: document.getElementById("movesOptimal"),
          victoryOverlay: document.getElementById("victoryOverlay"),
          victoryMovesDetail: document.getElementById("victoryMovesDetail"),
          victoryOptimalDetail: document.getElementById("victoryOptimalDetail"),
          controlPanel: document.getElementById("controlPanel"),
          gameArea: document.getElementById("gameArea"),
          towerElements: [document.getElementById("tower0"), document.getElementById("tower1"), document.getElementById("tower2")],
          diskWrappers: [document.getElementById("disksWrapper0"), document.getElementById("disksWrapper1"), document.getElementById("disksWrapper2")],
        };
        const state = {
          numDisks: 3,
          towers: [[], [], []],
          moves: 0,
          selectedTowerIndex: null,
          isAnimating: false,
          animationAbortFlag: false,
          theme: "light",
        };
        function saveThemePreference(theme) {
          try {
            localStorage.setItem(THEME_KEY, theme);
          } catch {}
        }
        function loadThemePreference() {
          try {
            return localStorage.getItem(THEME_KEY);
          } catch {
            return null;
          }
        }
        function applyTheme(theme) {
          state.theme = theme;
          document.documentElement.setAttribute("data-theme", theme);
          dom.btnThemeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
          dom.btnThemeToggle.setAttribute("aria-label", theme === "dark" ? "切换浅色模式" : "切换深色模式");
          dom.btnThemeToggle.title = theme === "dark" ? "切换浅色模式" : "切换深色模式";
        }
        function toggleTheme() {
          const next = state.theme === "dark" ? "light" : "dark";
          applyTheme(next);
          saveThemePreference(next);
        }
        function initTheme() {
          const saved = loadThemePreference();
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = saved || (prefersDark ? "dark" : "light");
          applyTheme(theme);
        }
        function getOptimalMoves(n) {
          return Math.pow(2, n) - 1;
        }
        function populateTowers(numDisks) {
          const towers = [[], [], []];
          for (let i = numDisks; i >= 1; i--) {
            towers[0].push(i);
          }
          return towers;
        }
        function resetState(numDisks) {
          state.numDisks = numDisks;
          state.towers = populateTowers(numDisks);
          state.moves = 0;
          state.selectedTowerIndex = null;
          state.animationAbortFlag = false;
          state.isAnimating = false;
        }
        function updateDisplay() {
          dom.movesCount.textContent = state.moves;
          dom.movesOptimal.textContent = getOptimalMoves(state.numDisks);
          dom.layerDisplay.textContent = state.numDisks;
        }
        function checkWin() {
          return state.towers[TARGET_TOWER].length === state.numDisks;
        }
        function executeMove(fromIndex, toIndex) {
          const fromTower = state.towers[fromIndex];
          if (fromTower.length === 0) return false;
          const disk = fromTower[fromTower.length - 1];
          const toTower = state.towers[toIndex];
          const targetTop = toTower.length > 0 ? toTower[toTower.length - 1] : Infinity;
          if (disk > targetTop) return false;
          fromTower.pop();
          toTower.push(disk);
          return true;
        }
        function handleTowerClick(towerIndex) {
          if (state.isAnimating) return;
          if (state.selectedTowerIndex === null) {
            if (state.towers[towerIndex].length > 0) {
              state.selectedTowerIndex = towerIndex;
              render();
            }
          } else if (state.selectedTowerIndex === towerIndex) {
            state.selectedTowerIndex = null;
            render();
          } else {
            const fromIndex = state.selectedTowerIndex;
            const success = executeMove(fromIndex, towerIndex);
            if (success) {
              state.selectedTowerIndex = null;
              state.moves++;
              updateDisplay();
              render();
              if (checkWin()) {
                showVictory();
              }
            } else {
              flashInvalidTower(towerIndex);
            }
          }
        }
        function flashInvalidTower(towerIndex) {
          const el = dom.towerElements[towerIndex];
          el.classList.add("tower-invalid");
          setTimeout(() => el.classList.remove("tower-invalid"), 450);
        }
        function showVictory() {
          const optimal = getOptimalMoves(state.numDisks);
          dom.victoryMovesDetail.textContent = `你完成了 ${state.numDisks} 层汉诺塔，共 ${state.moves} 步`;
          if (state.moves === optimal) {
            dom.victoryOptimalDetail.textContent = "🌟 完美！你达到了最优解！";
            dom.victoryOptimalDetail.className = "victory-detail victory-perfect";
          } else {
            dom.victoryOptimalDetail.textContent = `理论最优步数为 ${optimal} 步`;
            dom.victoryOptimalDetail.className = "victory-detail";
          }
          dom.victoryOverlay.classList.remove("hidden");
          setControlsEnabled(false);
        }
        function hideVictory() {
          dom.victoryOverlay.classList.add("hidden");
        }
        function setControlsEnabled(enabled) {
          const buttons = dom.controlPanel.querySelectorAll("button:not(#btnThemeToggle)");
          buttons.forEach((b) => (b.disabled = !enabled));
        }
        function enableControls() {
          setControlsEnabled(true);
        }
        function disableControls() {
          setControlsEnabled(false);
        }
        function render() {
          for (let t = 0; t < TOWER_COUNT; t++) {
            const wrapper = dom.diskWrappers[t];
            wrapper.innerHTML = "";
            const towerEl = dom.towerElements[t];
            towerEl.classList.remove("tower-selected");
            if (state.selectedTowerIndex === t) {
              towerEl.classList.add("tower-selected");
            }
            const towerDisks = state.towers[t];
            for (let d = 0; d < towerDisks.length; d++) {
              const diskSize = towerDisks[d];
              const diskEl = document.createElement("div");
              diskEl.className = "disk";
              const colorIndex = (diskSize - 1) % 8;
              diskEl.classList.add("disk-" + colorIndex);
              const widthPercent = 34 + (diskSize / state.numDisks) * 56;
              diskEl.style.width = widthPercent + "%";
              diskEl.setAttribute("data-disk-size", diskSize);
              diskEl.setAttribute("data-tower", t);
              const isTop = d === towerDisks.length - 1;
              const isSelected = state.selectedTowerIndex === t && isTop;
              if (isSelected) {
                diskEl.classList.add("disk-selected");
              }
              if (isTop && !state.isAnimating) {
                diskEl.draggable = true;
                diskEl.addEventListener("dragstart", (e) => {
                  if (state.isAnimating) {
                    e.preventDefault();
                    return;
                  }
                  e.dataTransfer.setData("text/plain", String(t));
                  e.dataTransfer.effectAllowed = "move";
                  state.selectedTowerIndex = t;
                  setTimeout(() => render(), 0);
                });
                diskEl.addEventListener("dragend", () => {
                  if (!state.isAnimating && state.selectedTowerIndex === t) {
                    state.selectedTowerIndex = null;
                    render();
                  }
                });
              } else {
                diskEl.draggable = false;
              }
              wrapper.appendChild(diskEl);
            }
          }
        }
        function init(numDisks) {
          const n = Math.max(DISK_MIN, Math.min(DISK_MAX, numDisks));
          resetState(n);
          updateDisplay();
          render();
          hideVictory();
          enableControls();
          dom.btnReset.disabled = false;
        }
        function reset() {
          state.animationAbortFlag = true;
          state.isAnimating = false;
          init(state.numDisks);
        }
        function changeLayers(delta) {
          if (state.isAnimating) return;
          const newNum = state.numDisks + delta;
          if (newNum < DISK_MIN || newNum > DISK_MAX) return;
          init(newNum);
        }
        function generateSolution(n, from, to, aux, moves) {
          if (n === 0) return;
          generateSolution(n - 1, from, aux, to, moves);
          moves.push([from, to]);
          generateSolution(n - 1, aux, to, from, moves);
        }
        function getAutoSolveDelay(totalSteps) {
          if (totalSteps <= 15) return 300;
          if (totalSteps <= 31) return 190;
          if (totalSteps <= 63) return 130;
          return 90;
        }
        function delay(ms) {
          return new Promise((resolve) => setTimeout(resolve, ms));
        }
        async function autoSolve() {
          if (state.isAnimating) return;
          if (state.towers[TARGET_TOWER].length === state.numDisks) return;
          if (state.towers[0].length !== state.numDisks && state.towers[1].length !== state.numDisks) {
            reset();
            await delay(180);
          }
          state.isAnimating = true;
          state.animationAbortFlag = false;
          state.selectedTowerIndex = null;
          disableControls();
          dom.btnReset.disabled = false;
          const solutionMoves = [];
          generateSolution(state.numDisks, 0, TARGET_TOWER, 1, solutionMoves);
          const stepDelay = getAutoSolveDelay(solutionMoves.length);
          for (const [from, to] of solutionMoves) {
            if (state.animationAbortFlag) break;
            await delay(stepDelay);
            if (state.animationAbortFlag) break;
            executeMove(from, to);
            state.moves++;
            updateDisplay();
            render();
            if (checkWin()) {
              showVictory();
              break;
            }
          }
          state.isAnimating = false;
          state.animationAbortFlag = false;
          if (!checkWin()) {
            enableControls();
          }
        }
        function bindTowerEvents() {
          dom.towerElements.forEach((towerEl, index) => {
            towerEl.addEventListener("click", () => {
              handleTowerClick(index);
            });
            towerEl.addEventListener("dragover", (e) => {
              e.preventDefault();
              e.dataTransfer.dropEffect = "move";
            });
            towerEl.addEventListener("drop", (e) => {
              e.preventDefault();
              if (state.isAnimating) return;
              const rawFrom = e.dataTransfer.getData("text/plain");
              if (rawFrom === "") return;
              const fromIndex = parseInt(rawFrom, 10);
              if (isNaN(fromIndex) || fromIndex === index) {
                state.selectedTowerIndex = null;
                render();
                return;
              }
              const success = executeMove(fromIndex, index);
              if (success) {
                state.selectedTowerIndex = null;
                state.moves++;
                updateDisplay();
                render();
                if (checkWin()) {
                  showVictory();
                }
              } else {
                state.selectedTowerIndex = null;
                render();
                flashInvalidTower(index);
              }
            });
          });
        }
        function bindControlEvents() {
          dom.btnDecrease.addEventListener("click", () => changeLayers(-1));
          dom.btnIncrease.addEventListener("click", () => changeLayers(1));
          dom.btnReset.addEventListener("click", () => reset());
          dom.btnAutoSolve.addEventListener("click", () => autoSolve());
          dom.btnVictoryRestart.addEventListener("click", () => {
            hideVictory();
            reset();
          });
          dom.btnThemeToggle.addEventListener("click", () => toggleTheme());
          dom.victoryOverlay.addEventListener("click", (e) => {
            if (e.target === dom.victoryOverlay) {
              hideVictory();
              reset();
            }
          });
        }
        function initAll() {
          initTheme();
          bindTowerEvents();
          bindControlEvents();
          init(state.numDisks);
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initAll);
        } else {
          initAll();
        }
      })();
    </script>
  </body>
</html>
