<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>俄罗斯方块</title>
    <style>
      :root {
        --bg-main: #1a1d23;
        --bg-card: #23262d;
        --bg-canvas: #1c1f26;
        --border: #363940;
        --text-main: #e6e3df;
        --text-sub: #9a9793;
        --theme: #4fd1c5;
        --theme-hover: #38b2a0;
        --points: #e8b84b;
        --btn-bg: #4fd1c5;
        --btn-text: #1a1d23;
        --btn-hover: #38b2a0;
        --btn-disabled: #3a3d44;
        --btn-disabled-text: #6b6b6b;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        --radius: 14px;
        --radius-sm: 10px;
        --gap: 28px;
        --game-width: 300px;
        --block-size: 30px;
        --panel-width: 200px;
        --transition-theme: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
      }
      body.light {
        --bg-main: #f2ede4;
        --bg-card: #faf7f1;
        --bg-canvas: #e6e0d4;
        --border: #d5cec0;
        --text-main: #3d3832;
        --text-sub: #6b6560;
        --theme: #2d8a6e;
        --theme-hover: #236d57;
        --points: #b87020;
        --btn-bg: #2d8a6e;
        --btn-text: #faf7f1;
        --btn-hover: #236d57;
        --btn-disabled: #d5cec0;
        --btn-disabled-text: #9a9590;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        scroll-behavior: smooth;
      }
      body {
        min-height: 100vh;
        background: var(--bg-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: clamp(12px, 2.5vw, 28px);
        color: var(--text-main);
        font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
        transition: var(--transition-theme);
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--gap);
        width: 100%;
        max-width: 1000px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(10px, 2vw, 20px);
        width: 100%;
        flex-wrap: wrap;
      }
      .header h1 {
        font-size: clamp(22px, calc(var(--block-size) * 1.2), 40px);
        color: var(--theme);
        font-weight: 600;
        letter-spacing: 0.04em;
        transition: var(--transition-theme);
        white-space: nowrap;
      }
      .theme-toggle {
        width: clamp(38px, calc(var(--block-size) * 1.4), 52px);
        height: clamp(38px, calc(var(--block-size) * 1.4), 52px);
        border-radius: 50%;
        border: 2px solid var(--border);
        background: var(--bg-card);
        cursor: pointer;
        font-size: clamp(18px, calc(var(--block-size) * 0.7), 24px);
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          var(--transition-theme),
          transform 0.2s ease;
        box-shadow: var(--shadow);
        line-height: 1;
      }
      .theme-toggle:hover {
        transform: scale(1.08);
        border-color: var(--theme);
      }
      .theme-toggle:active {
        transform: scale(0.94);
      }
      .main-row {
        display: flex;
        gap: var(--gap);
        align-items: flex-start;
        justify-content: center;
        flex-wrap: wrap;
        width: 100%;
      }
      .canvas-wrap {
        flex-shrink: 0;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-canvas);
        box-shadow: var(--shadow);
        transition: var(--transition-theme);
        line-height: 0;
        overflow: hidden;
      }
      .canvas-wrap canvas {
        display: block;
      }
      .side-panel {
        display: flex;
        flex-direction: column;
        gap: calc(var(--block-size) * 0.55);
        width: var(--panel-width);
        flex-shrink: 0;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-card);
        border-radius: var(--radius-sm);
        padding: calc(var(--block-size) * 0.45) calc(var(--block-size) * 0.6);
        box-shadow: var(--shadow);
        transition: var(--transition-theme);
        font-size: clamp(13px, calc(var(--block-size) * 0.48), 17px);
      }
      .info-row .label {
        color: var(--text-sub);
        transition: var(--transition-theme);
      }
      .info-row .value {
        font-weight: 700;
        font-size: clamp(18px, calc(var(--block-size) * 0.7), 28px);
        color: var(--points);
        transition: var(--transition-theme);
        font-variant-numeric: tabular-nums;
        font-family: "SF Mono", "Menlo", "Consolas", monospace;
        min-width: 50px;
        text-align: right;
      }
      .btn-group {
        display: flex;
        flex-direction: column;
        gap: calc(var(--block-size) * 0.35);
        background: var(--bg-card);
        border-radius: var(--radius-sm);
        padding: calc(var(--block-size) * 0.5);
        box-shadow: var(--shadow);
        transition: var(--transition-theme);
      }
      button {
        padding: clamp(10px, calc(var(--block-size) * 0.4), 16px) clamp(10px, calc(var(--block-size) * 0.5), 18px);
        border: none;
        border-radius: var(--radius-sm);
        font-size: clamp(14px, calc(var(--block-size) * 0.5), 18px);
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.03em;
        transition: all 0.2s ease;
        font-family: inherit;
        white-space: nowrap;
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }
      button:focus-visible {
        outline: 2px solid var(--theme);
        outline-offset: 2px;
      }
      .btn-primary {
        background: var(--btn-bg);
        color: var(--btn-text);
      }
      .btn-primary:hover {
        background: var(--btn-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(79, 209, 197, 0.25);
      }
      .btn-primary:active {
        transform: translateY(0);
        box-shadow: none;
      }
      .btn-primary:disabled {
        background: var(--btn-disabled);
        color: var(--btn-disabled-text);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .btn-outline {
        background: transparent;
        color: var(--text-main);
        border: 2px solid var(--border);
      }
      .btn-outline:hover {
        border-color: var(--theme);
        color: var(--theme);
        transform: translateY(-2px);
      }
      .btn-outline:active {
        transform: translateY(0);
      }
      .btn-outline:disabled {
        border-color: var(--btn-disabled);
        color: var(--btn-disabled-text);
        cursor: not-allowed;
        transform: none;
      }
      .mobile-panel {
        display: none;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        align-items: center;
      }
      .mobile-score-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: var(--game-width);
        gap: 12px;
      }
      .mobile-score-row .info-row {
        flex: 1;
      }
      .action-buttons {
        display: flex;
        gap: 8px;
        width: var(--game-width);
        justify-content: space-between;
      }
      .action-buttons button {
        flex: 1;
        min-width: 0;
        aspect-ratio: 1 / 1;
        max-width: calc(var(--block-size) * 2.4);
        border-radius: 50%;
        font-size: clamp(16px, 3vw, 20px);
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-card);
        color: var(--text-main);
        border: 2px solid var(--border);
        transition:
          var(--transition-theme),
          transform 0.15s ease;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
        min-width: 44px;
        min-height: 44px;
      }
      .action-buttons button:active {
        transform: scale(0.9);
        background: var(--theme);
        color: var(--btn-text);
        border-color: var(--theme);
      }
      .action-buttons button.hard-drop-btn {
        background: var(--theme);
        color: var(--btn-text);
        border-color: var(--theme);
        font-weight: 700;
      }
      .action-buttons button.hard-drop-btn:active {
        background: var(--theme-hover);
        border-color: var(--theme-hover);
        transform: scale(0.9);
      }
      .mobile-ctrl-row {
        display: flex;
        gap: 10px;
        width: var(--game-width);
      }
      .mobile-ctrl-row button {
        flex: 1;
        padding: clamp(10px, 2vw, 14px) clamp(6px, 1vw, 10px);
        font-size: clamp(13px, 2vw, 15px);
      }
      @media (max-width: 768px) {
        .side-panel {
          display: none;
        }
        .mobile-panel {
          display: flex;
        }
        .main-row {
          justify-content: center;
        }
        .game-wrapper {
          max-width: 420px;
          gap: 14px;
        }
        body {
          padding: clamp(8px, 2vw, 16px);
          justify-content: flex-start;
          padding-top: clamp(10px, 2.5vw, 20px);
        }
      }
      @media (min-width: 769px) {
        .mobile-panel {
          display: none;
        }
        .side-panel {
          display: flex;
        }
        .game-wrapper {
          max-width: 1000px;
        }
      }
      @keyframes flash-row {
        0%,
        100% {
          background-color: transparent;
        }
        50% {
          background-color: rgba(255, 255, 255, 0.75);
        }
      }
      .clearing-flash {
        animation: flash-row 0.3s ease-in-out 3;
      }
    </style>
  </head>
  <body>
    <div class="game-wrapper">
      <div class="header">
        <h1>俄罗斯方块</h1>
        <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换主题">🌙</button>
      </div>
      <div class="main-row">
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="tetris"></canvas>
        </div>
        <div class="side-panel" id="sidePanel">
          <div class="info-row">
            <span class="label">当前得分</span>
            <span class="value" id="scoreDesktop">0</span>
          </div>
          <div class="info-row">
            <span class="label">游戏等级</span>
            <span class="value" id="levelDesktop">1</span>
          </div>
          <div class="btn-group">
            <button class="btn-primary" id="startBtn">开始游戏</button>
            <button class="btn-outline" id="pauseBtn" disabled>暂停游戏</button>
            <button class="btn-outline" id="resetBtn">重置游戏</button>
          </div>
        </div>
      </div>
      <div class="mobile-panel" id="mobilePanel">
        <div class="action-buttons" id="actionButtons">
          <button id="btnLeft" title="左移">←</button>
          <button id="btnRotate" title="旋转">↻</button>
          <button class="hard-drop-btn" id="btnHardDrop" title="快速下落">⇩</button>
          <button id="btnDown" title="下落">↓</button>
          <button id="btnRight" title="右移">→</button>
        </div>
        <div class="mobile-score-row">
          <div class="info-row">
            <span class="label">得分</span>
            <span class="value" id="scoreMobile">0</span>
          </div>
          <div class="info-row">
            <span class="label">等级</span>
            <span class="value" id="levelMobile">1</span>
          </div>
        </div>
        <div class="mobile-ctrl-row">
          <button class="btn-primary" id="startBtnMobile">开始</button>
          <button class="btn-outline" id="pauseBtnMobile" disabled>暂停</button>
          <button class="btn-outline" id="resetBtnMobile">重置</button>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const CONFIG = Object.freeze({
          COLS: 10,
          ROWS: 20,
          INIT_SPEED: 1000,
          MIN_SPEED: 80,
          SPEED_STEP: 90,
          LEVEL_UP_SCORE: 500,
          SCORE_RULES: [0, 100, 300, 500, 800],
          SHAPES: [
            { shape: [[1, 1, 1, 1]], color: "#5ec4c4" },
            {
              shape: [
                [1, 1],
                [1, 1],
              ],
              color: "#e8b84b",
            },
            {
              shape: [
                [0, 1, 0],
                [1, 1, 1],
              ],
              color: "#9b6ec5",
            },
            {
              shape: [
                [0, 0, 1],
                [1, 1, 1],
              ],
              color: "#e8824b",
            },
            {
              shape: [
                [1, 0, 0],
                [1, 1, 1],
              ],
              color: "#5b8ec5",
            },
            {
              shape: [
                [0, 1, 1],
                [1, 1, 0],
              ],
              color: "#6bb85b",
            },
            {
              shape: [
                [1, 1, 0],
                [0, 1, 1],
              ],
              color: "#d85b5b",
            },
          ],
          CLEAR_ANIM_DURATION: 220,
          FLASH_INTERVAL: 45,
        });
        const canvas = document.getElementById("tetris");
        const ctx = canvas.getContext("2d");
        const canvasWrap = document.getElementById("canvasWrap");
        const sidePanel = document.getElementById("sidePanel");
        const mobilePanel = document.getElementById("mobilePanel");
        const scoreDesktop = document.getElementById("scoreDesktop");
        const levelDesktop = document.getElementById("levelDesktop");
        const scoreMobile = document.getElementById("scoreMobile");
        const levelMobile = document.getElementById("levelMobile");
        const startBtn = document.getElementById("startBtn");
        const pauseBtn = document.getElementById("pauseBtn");
        const resetBtn = document.getElementById("resetBtn");
        const startBtnMobile = document.getElementById("startBtnMobile");
        const pauseBtnMobile = document.getElementById("pauseBtnMobile");
        const resetBtnMobile = document.getElementById("resetBtnMobile");
        const themeToggle = document.getElementById("themeToggle");
        const actionButtons = document.getElementById("actionButtons");
        const state = {
          board: [],
          currentPiece: null,
          posX: 0,
          posY: 0,
          score: 0,
          level: 1,
          speed: CONFIG.INIT_SPEED,
          timer: null,
          isPlaying: false,
          isPaused: false,
          isGameOver: false,
          isClearing: false,
          clearingRows: [],
          clearStartTime: 0,
          clearHighlight: false,
          blockSize: 30,
          gameWidth: 300,
          gameHeight: 600,
          isMobile: false,
          panelWidth: 200,
        };
        let dpr = Math.min(window.devicePixelRatio || 1, 2);
        let clearAnimRafId = null;
        const calcDimensions = () => {
          const w = window.innerWidth;
          const h = window.innerHeight;
          const mobile = w <= 768;
          if (mobile) {
            const maxW = Math.min(w - 28, 400);
            const bs = Math.floor(maxW / CONFIG.COLS);
            const gw = bs * CONFIG.COLS;
            const gh = bs * CONFIG.ROWS;
            return { blockSize: bs, gameWidth: gw, gameHeight: gh, isMobile: true, panelWidth: 0 };
          }
          const minPanelWidth = 180;
          const maxPanelWidth = 320;
          const sidePadding = 40;
          const maxTotalWidth = w - sidePadding;
          const maxBsFromHeight = Math.floor((h * 0.85) / CONFIG.ROWS);
          let bs = Math.floor((maxTotalWidth - minPanelWidth - 20) / CONFIG.COLS);
          bs = Math.min(bs, maxBsFromHeight);
          bs = Math.max(24, Math.min(42, bs));
          const gw = bs * CONFIG.COLS;
          const gh = bs * CONFIG.ROWS;
          const gap = Math.round(bs * 0.95);
          let panelW = maxTotalWidth - gw - gap;
          panelW = Math.max(minPanelWidth, Math.min(maxPanelWidth, panelW));
          if (gw + gap + panelW > maxTotalWidth) {
            bs = Math.floor((maxTotalWidth - panelW - gap) / CONFIG.COLS);
            bs = Math.max(24, bs);
            const newGw = bs * CONFIG.COLS;
            const newGh = bs * CONFIG.ROWS;
            const newGap = Math.round(bs * 0.95);
            return {
              blockSize: bs,
              gameWidth: newGw,
              gameHeight: newGh,
              isMobile: false,
              panelWidth: panelW,
            };
          }
          return { blockSize: bs, gameWidth: gw, gameHeight: gh, isMobile: false, panelWidth: panelW };
        };
        const applyDimensions = (dims) => {
          state.blockSize = dims.blockSize;
          state.gameWidth = dims.gameWidth;
          state.gameHeight = dims.gameHeight;
          state.isMobile = dims.isMobile;
          state.panelWidth = dims.panelWidth;
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = dims.gameWidth * dpr;
          canvas.height = dims.gameHeight * dpr;
          canvas.style.width = dims.gameWidth + "px";
          canvas.style.height = dims.gameHeight + "px";
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.scale(dpr, dpr);
          const gap = Math.round(dims.blockSize * 0.95);
          document.documentElement.style.setProperty("--game-width", dims.gameWidth + "px");
          document.documentElement.style.setProperty("--block-size", dims.blockSize + "px");
          document.documentElement.style.setProperty("--panel-width", dims.panelWidth ? dims.panelWidth + "px" : "200px");
          document.documentElement.style.setProperty("--gap", gap + "px");
          canvasWrap.style.width = dims.gameWidth + "px";
          canvasWrap.style.height = dims.gameHeight + "px";
        };
        const syncScoreDisplay = () => {
          const sc = String(state.score);
          const lv = String(state.level);
          scoreDesktop.textContent = sc;
          levelDesktop.textContent = lv;
          scoreMobile.textContent = sc;
          levelMobile.textContent = lv;
        };
        const updateButtonStates = () => {
          const playing = state.isPlaying && !state.isGameOver && !state.isClearing;
          const paused = state.isPaused;
          const canPause = playing;
          startBtn.disabled = playing && !paused;
          pauseBtn.disabled = !canPause;
          pauseBtn.textContent = paused ? "继续游戏" : "暂停游戏";
          startBtnMobile.disabled = playing && !paused;
          pauseBtnMobile.disabled = !canPause;
          pauseBtnMobile.textContent = paused ? "继续" : "暂停";
          const actionDisabled = !playing || paused || state.isClearing;
          const actionBtns = actionButtons.querySelectorAll("button");
          actionBtns.forEach((b) => {
            b.disabled = actionDisabled;
          });
        };
        const resetBoard = () => {
          state.board = Array.from({ length: CONFIG.ROWS }, () => Array(CONFIG.COLS).fill(null));
        };
        const getRandomPiece = () => {
          const idx = (Math.random() * CONFIG.SHAPES.length) | 0;
          const src = CONFIG.SHAPES[idx];
          return { shape: src.shape.map((r) => [...r]), color: src.color };
        };
        const checkCollision = (piece, px, py) => {
          for (let r = 0; r < piece.shape.length; r++) {
            for (let c = 0; c < piece.shape[r].length; c++) {
              if (!piece.shape[r][c]) continue;
              const nx = px + c;
              const ny = py + r;
              if (nx < 0 || nx >= CONFIG.COLS || ny >= CONFIG.ROWS) return true;
              if (ny >= 0 && state.board[ny][nx]) return true;
            }
          }
          return false;
        };
        const spawnPiece = () => {
          state.currentPiece = getRandomPiece();
          state.posX = (CONFIG.COLS - state.currentPiece.shape[0].length) >> 1;
          state.posY = 0;
          if (checkCollision(state.currentPiece, state.posX, state.posY)) {
            handleGameOver();
          }
        };
        const mergePieceToBoard = () => {
          const { shape, color } = state.currentPiece;
          for (let r = 0; r < shape.length; r++) {
            for (let c = 0; c < shape[r].length; c++) {
              if (shape[r][c]) {
                const by = state.posY + r;
                const bx = state.posX + c;
                if (by >= 0 && by < CONFIG.ROWS && bx >= 0 && bx < CONFIG.COLS) {
                  state.board[by][bx] = color;
                }
              }
            }
          }
        };
        const findFullRows = () => {
          const rows = [];
          for (let r = 0; r < CONFIG.ROWS; r++) {
            if (state.board[r].every((cell) => cell !== null)) {
              rows.push(r);
            }
          }
          return rows;
        };
        const executeClearRows = (rows) => {
          const sorted = [...rows].sort((a, b) => b - a);
          for (const r of sorted) {
            state.board.splice(r, 1);
            state.board.unshift(Array(CONFIG.COLS).fill(null));
          }
          const cleared = rows.length;
          state.score += CONFIG.SCORE_RULES[cleared] * state.level;
          state.level = Math.max(1, ((state.score / CONFIG.LEVEL_UP_SCORE) | 0) + 1);
          state.speed = Math.max(CONFIG.MIN_SPEED, CONFIG.INIT_SPEED - (state.level - 1) * CONFIG.SPEED_STEP);
          syncScoreDisplay();
        };
        const startClearAnimation = (rows) => {
          state.isClearing = true;
          state.clearingRows = [...rows];
          state.clearStartTime = performance.now();
          state.clearHighlight = true;
          updateButtonStates();
          stopTimer();
          if (clearAnimRafId) cancelAnimationFrame(clearAnimRafId);
          clearAnimLoop();
        };
        const clearAnimLoop = () => {
          const elapsed = performance.now() - state.clearStartTime;
          if (elapsed < CONFIG.CLEAR_ANIM_DURATION) {
            state.clearHighlight = Math.floor(elapsed / CONFIG.FLASH_INTERVAL) % 2 === 0;
            render();
            clearAnimRafId = requestAnimationFrame(clearAnimLoop);
          } else {
            finishClearAnimation();
          }
        };
        const finishClearAnimation = () => {
          const rows = state.clearingRows;
          executeClearRows(rows);
          state.isClearing = false;
          state.clearingRows = [];
          state.clearHighlight = false;
          clearAnimRafId = null;
          spawnPiece();
          render();
          syncScoreDisplay();
          updateButtonStates();
          if (state.isPlaying && !state.isPaused && !state.isGameOver) {
            startTimer();
          }
        };
        const cancelClearAnimation = () => {
          if (clearAnimRafId) {
            cancelAnimationFrame(clearAnimRafId);
            clearAnimRafId = null;
          }
          state.isClearing = false;
          state.clearingRows = [];
          state.clearHighlight = false;
        };
        const triggerClearCheck = () => {
          const fullRows = findFullRows();
          if (fullRows.length > 0) {
            startClearAnimation(fullRows);
          } else {
            spawnPiece();
            render();
            syncScoreDisplay();
            updateButtonStates();
            if (state.isPlaying && !state.isPaused && !state.isGameOver) {
              startTimer();
            }
          }
        };
        const moveDown = () => {
          if (!state.isPlaying || state.isPaused || state.isGameOver || state.isClearing) return;
          if (checkCollision(state.currentPiece, state.posX, state.posY + 1)) {
            stopTimer();
            mergePieceToBoard();
            triggerClearCheck();
          } else {
            state.posY++;
          }
          render();
          updateButtonStates();
        };
        const moveHorizontal = (dir) => {
          if (!state.isPlaying || state.isPaused || state.isGameOver || state.isClearing) return;
          const nx = state.posX + dir;
          if (!checkCollision(state.currentPiece, nx, state.posY)) {
            state.posX = nx;
            render();
          }
        };
        const rotatePiece = () => {
          if (!state.isPlaying || state.isPaused || state.isGameOver || state.isClearing) return;
          const original = state.currentPiece.shape.map((r) => [...r]);
          const rows = original.length;
          const cols = original[0].length;
          const rotated = Array.from({ length: cols }, (_, i) => Array.from({ length: rows }, (_, j) => original[rows - 1 - j][i]));
          state.currentPiece.shape = rotated;
          if (checkCollision(state.currentPiece, state.posX, state.posY)) {
            state.currentPiece.shape = original;
          }
          render();
        };
        const hardDrop = () => {
          if (!state.isPlaying || state.isPaused || state.isGameOver || state.isClearing) return;
          stopTimer();
          while (!checkCollision(state.currentPiece, state.posX, state.posY + 1)) {
            state.posY++;
          }
          mergePieceToBoard();
          triggerClearCheck();
          render();
          updateButtonStates();
        };
        const drawBlock = (x, y, color, bs) => {
          const px = x * bs;
          const py = y * bs;
          const size = bs - 1;
          ctx.fillStyle = color;
          ctx.fillRect(px, py, size, size);
          const grad = ctx.createLinearGradient(px, py, px + size, py + size);
          grad.addColorStop(0, "rgba(255,255,255,0.28)");
          grad.addColorStop(0.5, "rgba(255,255,255,0.06)");
          grad.addColorStop(1, "rgba(0,0,0,0.18)");
          ctx.fillStyle = grad;
          ctx.fillRect(px, py, size, size);
          ctx.strokeStyle = "rgba(0,0,0,0.22)";
          ctx.lineWidth = 0.8;
          ctx.strokeRect(px + 0.5, py + 0.5, size - 1, size - 1);
        };
        const render = () => {
          const bs = state.blockSize;
          ctx.clearRect(0, 0, state.gameWidth, state.gameHeight);
          for (let r = 0; r < CONFIG.ROWS; r++) {
            for (let c = 0; c < CONFIG.COLS; c++) {
              const cell = state.board[r][c];
              if (cell) {
                const isFlashing = state.isClearing && state.clearHighlight && state.clearingRows.includes(r);
                drawBlock(c, r, isFlashing ? "#ffffff" : cell, bs);
              } else if (state.isClearing && state.clearHighlight && state.clearingRows.includes(r)) {
                drawBlock(c, r, "#ffffff", bs);
              }
            }
          }
          if (state.currentPiece && !state.isGameOver) {
            const { shape, color } = state.currentPiece;
            for (let r = 0; r < shape.length; r++) {
              for (let c = 0; c < shape[r].length; c++) {
                if (shape[r][c]) {
                  drawBlock(state.posX + c, state.posY + r, color, bs);
                }
              }
            }
          }
          if (state.isPaused && state.isPlaying && !state.isGameOver && !state.isClearing) {
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0, 0, state.gameWidth, state.gameHeight);
            ctx.fillStyle = "#ffffff";
            ctx.font = `bold ${Math.max(bs * 1.1, 20)}px "PingFang SC","Microsoft YaHei",sans-serif`;
            ctx.textAlign = "center";
            ctx.fillText("暂停中", state.gameWidth / 2, state.gameHeight / 2);
            ctx.textAlign = "start";
          }
        };
        const stopTimer = () => {
          if (state.timer) {
            clearInterval(state.timer);
            state.timer = null;
          }
        };
        const startTimer = () => {
          stopTimer();
          state.timer = setInterval(moveDown, state.speed);
        };
        const startGame = () => {
          if (state.isGameOver) {
            resetGameInternal();
          }
          if (state.isClearing) return;
          state.isPlaying = true;
          state.isPaused = false;
          state.isGameOver = false;
          updateButtonStates();
          startTimer();
          render();
        };
        const togglePause = () => {
          if (!state.isPlaying || state.isGameOver || state.isClearing) return;
          state.isPaused = !state.isPaused;
          if (state.isPaused) {
            stopTimer();
          } else {
            startTimer();
          }
          updateButtonStates();
          render();
        };
        const resetGameInternal = () => {
          stopTimer();
          cancelClearAnimation();
          resetBoard();
          state.score = 0;
          state.level = 1;
          state.speed = CONFIG.INIT_SPEED;
          state.isPlaying = false;
          state.isPaused = false;
          state.isGameOver = false;
          state.isClearing = false;
          state.clearingRows = [];
          state.clearHighlight = false;
          state.currentPiece = null;
          syncScoreDisplay();
          spawnPiece();
          render();
          updateButtonStates();
        };
        const resetGame = () => {
          resetGameInternal();
        };
        const handleGameOver = () => {
          state.isGameOver = true;
          state.isPlaying = false;
          state.isPaused = false;
          stopTimer();
          cancelClearAnimation();
          state.isClearing = false;
          state.clearingRows = [];
          updateButtonStates();
          render();
          setTimeout(() => {
            alert(`游戏结束！\n最终得分：${state.score}\n等级：${state.level}`);
          }, 150);
        };
        const handleKeyDown = (e) => {
          if (e.repeat && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
            e.preventDefault();
            if (e.key === "ArrowDown") {
              moveDown();
              return;
            }
            if (e.key === "ArrowLeft") {
              moveHorizontal(-1);
              return;
            }
            if (e.key === "ArrowRight") {
              moveHorizontal(1);
              return;
            }
            return;
          }
          const key = e.key;
          const map = {
            ArrowLeft: () => moveHorizontal(-1),
            ArrowRight: () => moveHorizontal(1),
            ArrowUp: rotatePiece,
            ArrowDown: moveDown,
            a: () => moveHorizontal(-1),
            A: () => moveHorizontal(-1),
            d: () => moveHorizontal(1),
            D: () => moveHorizontal(1),
            w: rotatePiece,
            W: rotatePiece,
            s: moveDown,
            S: moveDown,
            " ": hardDrop,
          };
          if (map[key]) {
            e.preventDefault();
            map[key]();
          }
          if (key === "p" || key === "P") {
            e.preventDefault();
            togglePause();
          }
          if (key === "Escape") {
            e.preventDefault();
            if (state.isPlaying && !state.isPaused && !state.isGameOver && !state.isClearing) {
              togglePause();
            }
          }
        };
        const handleResize = () => {
          const dims = calcDimensions();
          const prevBs = state.blockSize;
          const prevMobile = state.isMobile;
          applyDimensions(dims);
          if (prevBs !== dims.blockSize || prevMobile !== dims.isMobile) {
            mobilePanel.style.display = dims.isMobile ? "flex" : "none";
            sidePanel.style.display = dims.isMobile ? "none" : "flex";
            if (dims.isMobile) {
              mobilePanel.style.width = dims.gameWidth + "px";
            }
            updateButtonStates();
          }
          render();
        };
        const setupTheme = () => {
          const saved = localStorage.getItem("tetris-theme");
          if (saved === "light") {
            document.body.classList.add("light");
            themeToggle.textContent = "☀️";
          } else {
            document.body.classList.remove("light");
            themeToggle.textContent = "🌙";
          }
        };
        const toggleTheme = () => {
          const isLight = document.body.classList.toggle("light");
          themeToggle.textContent = isLight ? "☀️" : "🌙";
          localStorage.setItem("tetris-theme", isLight ? "light" : "dark");
        };
        const bindEvents = () => {
          document.addEventListener("keydown", handleKeyDown);
          window.addEventListener("resize", () => {
            clearTimeout(window._resizeTid);
            window._resizeTid = setTimeout(handleResize, 200);
          });
          themeToggle.addEventListener("click", toggleTheme);
          startBtn.addEventListener("click", startGame);
          pauseBtn.addEventListener("click", togglePause);
          resetBtn.addEventListener("click", resetGame);
          startBtnMobile.addEventListener("click", startGame);
          pauseBtnMobile.addEventListener("click", togglePause);
          resetBtnMobile.addEventListener("click", resetGame);
          document.getElementById("btnLeft").addEventListener("pointerdown", (e) => {
            e.preventDefault();
            moveHorizontal(-1);
          });
          document.getElementById("btnRotate").addEventListener("pointerdown", (e) => {
            e.preventDefault();
            rotatePiece();
          });
          document.getElementById("btnHardDrop").addEventListener("pointerdown", (e) => {
            e.preventDefault();
            hardDrop();
          });
          document.getElementById("btnDown").addEventListener("pointerdown", (e) => {
            e.preventDefault();
            moveDown();
          });
          document.getElementById("btnRight").addEventListener("pointerdown", (e) => {
            e.preventDefault();
            moveHorizontal(1);
          });
          canvasWrap.addEventListener("contextmenu", (e) => e.preventDefault());
        };
        const init = () => {
          const dims = calcDimensions();
          applyDimensions(dims);
          mobilePanel.style.display = dims.isMobile ? "flex" : "none";
          sidePanel.style.display = dims.isMobile ? "none" : "flex";
          if (dims.isMobile) {
            mobilePanel.style.width = dims.gameWidth + "px";
          }
          setupTheme();
          resetBoard();
          spawnPiece();
          render();
          syncScoreDisplay();
          updateButtonStates();
          bindEvents();
        };
        init();
      })();
    </script>
  </body>
</html>
